---
# Workflow: Create Compute Instance
# This workflow creates a virtual machine from a ComputeInstance CRD.
# Major workflow phases can be overridden, and hooks allow customization at workflow boundaries.
#
# Usage:
#   - name: Create compute instance
#     ansible.builtin.import_playbook: osac.workflows.compute_instance.create
#     vars:
#       compute_instance: "{{ ansible_eda.event.payload }}"
#
# Hook example:
#   - name: Create compute instance with custom hooks
#     ansible.builtin.import_playbook: osac.workflows.compute_instance.create
#     vars:
#       compute_instance: "{{ ansible_eda.event.payload }}"
#       hook_workflow_start:
#         name: my_custom_hooks
#         tasks_from: validate_vm.yml

- name: Create compute instance workflow
  hosts: localhost
  gather_facts: false
  environment:
    K8S_AUTH_KUBECONFIG: "{{ lookup('env', 'K8S_AUTH_KUBECONFIG') | default(lookup('env', 'KUBECONFIG'), true) | default(lookup('env', 'HOME') + '/.kube/config', true) }}"


  vars:
    compute_instance: "{{ ansible_eda.event.payload }}"

    # GENERIC HOOKS - Default to noop
    hook_workflow_start_default:
      name: osac.workflows.workflow_helpers
      tasks_from: noop.yml

    hook_workflow_complete_default:
      name: osac.workflows.workflow_helpers
      tasks_from: noop.yml

  collections:
    - osac.workflows
    - osac.service
    - osac.templates

  pre_tasks:
    # HOOK: Workflow start
    - name: Hook - Workflow start
      ansible.builtin.include_role:
        name: "{{ (hook_workflow_start | default(hook_workflow_start_default)).name }}"
        tasks_from: "{{ (hook_workflow_start | default(hook_workflow_start_default)).tasks_from }}"

    # CRITICAL: Extract compute instance name and template ID (NOT overrideable)
    - name: Set compute instance name
      ansible.builtin.set_fact:
        compute_instance_name: "{{ compute_instance.metadata.name }}"

    - name: Set template ID
      ansible.builtin.set_fact:
        template_id: "{{ compute_instance.spec.templateID }}"

    - name: Set template parameters
      ansible.builtin.set_fact:
        template_parameters: {}

    # CRITICAL: Determine namespace (NOT overrideable)
    - name: Determine tenant target namespace
      ansible.builtin.include_role:
        name: osac.service.tenant_target_namespace

  tasks:
    # Guard: surfaces the ocp_virt_vm assertion (create_resources.yaml) earlier with a clearer message.
    # This workflow is an internal implementation detail invoked via import_playbook — JIT storage
    # provisioning only runs in the top-level playbook (playbook_osac_create_compute_instance.yml).
    # Direct invocation of this workflow bypasses JIT, so this guard catches that case explicitly.
    - name: Fail if tenant_storage_class_name is not set before template call
      ansible.builtin.fail:
        msg: >-
          tenant_storage_class_name is not defined or empty. Direct invocation of this workflow
          bypasses JIT storage provisioning (osac.service.storage_provider ensure_storage_class).
          Either invoke via playbook_osac_create_compute_instance.yml (recommended) or set
          tenant_storage_class_name explicitly before calling this workflow.
      when: tenant_storage_class_name is not defined or tenant_storage_class_name | length == 0

    - name: Display compute instance information
      ansible.builtin.debug:
        msg:
          - "Compute instance name: {{ compute_instance_name }}"
          - "Tenant target namespace: {{ tenant_target_namespace }}"
          - "Template ID: {{ template_id_override | default(template_id) }}"
          - "Template parameters: {{ template_parameters }}"

    # CRITICAL: Add finalizer (NOT overrideable)
    - name: Add compute instance finalizer
      ansible.builtin.include_role:
        name: osac.service.finalizer
      vars:
        finalizer_state: present
        finalizer_name: "{{ compute_instance_osac_finalizer }}"
        finalizer_target:
          api_version: osac.openshift.io/v1alpha1
          kind: ComputeInstance
          namespace: "{{ compute_instance.metadata.namespace }}"
          name: "{{ compute_instance_name }}"

    # CRITICAL: Call template (NOT overrideable, but template has internal override points)
    - name: Call selected template
      ansible.builtin.include_role:
        name: "{{ template_id_override | default(template_id) }}"
        tasks_from: create

    # HOOK: Workflow complete
    - name: Hook - Workflow complete
      ansible.builtin.include_role:
        name: "{{ (hook_workflow_complete | default(hook_workflow_complete_default)).name }}"
        tasks_from: "{{ (hook_workflow_complete | default(hook_workflow_complete_default)).tasks_from }}"
