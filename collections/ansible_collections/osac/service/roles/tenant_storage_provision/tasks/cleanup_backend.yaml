---
# CSP extension point: clean up the storage backend for a tenant.
#
# This runs BEFORE StorageClasses are removed (in tasks/delete.yaml).
# The VAST provider deletes VAST VMS resources (View, VIP Pool, Tenant),
# CSI Secret, VolumeSnapshotClass, and tenant config Secret.
#
# Available variables when this runs:
#   tenant_storage_provision_tenant_name  — the tenant name
#   tenant_namespace                      — the tenant's target namespace on the remote cluster (play-level var from delete.yaml)
#   _tsp_tenant_scs                      — list of tenant StorageClass objects about to be deleted
#   kubeconfig                            — optional remote cluster kubeconfig
- name: Check storage provider type
  ansible.builtin.set_fact:
    _tsp_storage_provider_type: "{{ lookup('env', 'STORAGE_PROVIDER_TYPE') | default('', true) }}"

- name: Clean up VAST storage backend
  when: _tsp_storage_provider_type | lower == 'vast'
  ansible.builtin.include_role:
    name: osac.templates.vast_storage
    tasks_from: cleanup_backend
