---
# CSP extension point: configure the storage backend for a tenant.
#
# This runs BEFORE StorageClasses are created. The VAST provider installs
# the CSI operator, provisions VAST VMS resources (Tenant, VIP Pool, View),
# creates the CSI Secret, and overrides tenant_storage_provision_tiers so
# PR #266's create.yaml uses VAST-specific provisioner/parameters.
#
# Available variables when this runs:
#   tenant_storage_provision_tenant_name  — the tenant name
#   tenant_storage_provision_tiers        — the tier list (overridden via set_fact)
#   _tsp_ref_sc                          — the reference StorageClass object
#   _tsp_reference_sc_name               — the reference SC name
#   tenant_namespace                      — the tenant's target namespace on the remote cluster (play-level var from create.yaml)
#   kubeconfig                            — optional remote cluster kubeconfig
- name: Check storage provider type
  ansible.builtin.set_fact:
    _tsp_storage_provider_type: "{{ lookup('env', 'STORAGE_PROVIDER_TYPE') | default('', true) }}"

- name: Configure VAST storage backend
  when: _tsp_storage_provider_type == 'vast'
  ansible.builtin.include_role:
    name: osac.templates.vast_storage
    tasks_from: configure_backend
