---
# Test playbook for osac.templates.metallb_l2 role.
#
# Tests create, delete, attach, and detach of MetalLB resources:
#   - PublicIPPool: IPAddressPool and L2Advertisement
#   - PublicIP: LoadBalancer Service for IP allocation
#   - Attach: moves IP from parking Service to VM namespace LB Service
#   - Detach: removes VM namespace LB Service and re-parks the IP
#
# Requires a cluster with MetalLB CRDs applied and the metallb-system
# namespace present. No MetalLB operator is needed for pool tests since
# they only verify CR creation/deletion. PublicIP tests require a
# running MetalLB controller to assign IPs to LoadBalancer Services.
#
# Do NOT set OSAC_REMOTE_CLUSTER_KUBECONFIG when running these tests.
# The role's get_remote_cluster_kubeconfig include is a no-op without it,
# and kubernetes.core.k8s falls back to the default kubeconfig.
#
# Usage:
#   # Run all tests in sequence
#   ansible-playbook test.yml -v
#
#   # Run only pool create tests
#   ansible-playbook test.yml -e run_create=true -e run_create_ip=false \
#     -e run_delete_ip=false -e run_delete_ip_not_found=false \
#     -e run_delete=false -e run_delete_not_found=false -v
#
#   # Run only PublicIP create tests (pool must already exist)
#   ansible-playbook test.yml -e run_create=false -e run_create_ip=true \
#     -e run_delete_ip=false -e run_delete_ip_not_found=false \
#     -e run_delete=false -e run_delete_not_found=false -v
#
#   # Run only PublicIP delete tests (LB Service must already exist)
#   ansible-playbook test.yml -e run_create=false -e run_create_ip=false \
#     -e run_delete_ip=true -e run_delete_ip_not_found=false \
#     -e run_delete=false -e run_delete_not_found=false \
#     -e run_attach=false -e run_detach=false -v
#
#   # Run only attach test (pool and parking Service must already exist)
#   ansible-playbook test.yml -e run_create=false -e run_create_ip=false \
#     -e run_delete_ip=false -e run_delete_ip_not_found=false \
#     -e run_delete=false -e run_delete_not_found=false \
#     -e run_attach=true -e run_detach=false -v
#
#   # Run only detach test (attach test must have run first)
#   ansible-playbook test.yml -e run_create=false -e run_create_ip=false \
#     -e run_delete_ip=false -e run_delete_ip_not_found=false \
#     -e run_delete=false -e run_delete_not_found=false \
#     -e run_attach=false -e run_detach=true -v
#
#   # Run all tests with user impersonation (needed when your user lacks
#   # direct RBAC for metallb-system resources)
#   ansible-playbook test.yml -e test_impersonate_user=system:admin -v

# ──────────────────────────────────────────────────────────────
# Pre-flight: fail fast if OSAC_REMOTE_CLUSTER_KUBECONFIG is set
# ──────────────────────────────────────────────────────────────
- name: Validate metallb_l2 test environment
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Fail if OSAC_REMOTE_CLUSTER_KUBECONFIG is set
      ansible.builtin.fail:
        msg: >-
          OSAC_REMOTE_CLUSTER_KUBECONFIG is set. This test expects the role to
          use the default kubeconfig. Unset the variable before running tests.
      when: lookup('env', 'OSAC_REMOTE_CLUSTER_KUBECONFIG') | length > 0

# ──────────────────────────────────────────────────────────────
# Test: Create IPAddressPool and L2Advertisement
# Expected: Both resources created in metallb-system with correct
#   spec, labels, and naming conventions.
# ──────────────────────────────────────────────────────────────
- name: Test metallb_l2 role -- create PublicIPPool resources
  hosts: localhost
  gather_facts: false
  environment:
    K8S_AUTH_IMPERSONATE_USER: "{{ test_impersonate_user | default('') }}"

  vars:
    test_pool_name: "test-metallb-pool"
    test_pool_cidrs:
      - "192.168.100.0/28"
      - "192.168.101.0/28"
    public_ip_pool_name: "{{ test_pool_name }}"
    public_ip_pool:
      metadata:
        name: "{{ test_pool_name }}"
      spec:
        cidrs: "{{ test_pool_cidrs }}"

  tasks:
    - name: Run create tests
      when: run_create | default(true) | bool
      block:
        - name: Check IPAddressPool does not already exist
          kubernetes.core.k8s_info:
            api_version: metallb.io/v1beta1
            kind: IPAddressPool
            name: "{{ test_pool_name }}"
            namespace: metallb-system
          register: pre_create_pool

        - name: Check L2Advertisement does not already exist
          kubernetes.core.k8s_info:
            api_version: metallb.io/v1beta1
            kind: L2Advertisement
            name: "{{ test_pool_name }}-l2adv"
            namespace: metallb-system
          register: pre_create_l2adv

        - name: Assert clean state before create
          ansible.builtin.assert:
            that:
              - pre_create_pool.resources | length == 0
              - pre_create_l2adv.resources | length == 0
            fail_msg: >-
              Stale test resources exist from a previous run. Clean up with:
              oc delete ipaddresspool {{ test_pool_name }} -n metallb-system --ignore-not-found &&
              oc delete l2advertisement {{ test_pool_name }}-l2adv -n metallb-system --ignore-not-found
            success_msg: "No stale resources, proceeding with create"

        - name: Create MetalLB resources via metallb_l2 role
          ansible.builtin.include_role:
            name: osac.templates.metallb_l2
            tasks_from: create_public_ip_pool

        - name: Fetch IPAddressPool
          kubernetes.core.k8s_info:
            api_version: metallb.io/v1beta1
            kind: IPAddressPool
            name: "{{ test_pool_name }}"
            namespace: metallb-system
          register: ipaddresspool_result

        - name: Verify IPAddressPool exists with correct spec
          ansible.builtin.assert:
            that:
              - ipaddresspool_result.resources | length == 1
              - ipaddresspool_result.resources[0].spec.autoAssign == false
              - ipaddresspool_result.resources[0].spec.addresses == test_pool_cidrs
            fail_msg: "IPAddressPool not created correctly"
            success_msg: "IPAddressPool '{{ test_pool_name }}' created with correct spec"

        - name: Verify IPAddressPool labels
          ansible.builtin.assert:
            that:
              - ipaddresspool_result.resources[0].metadata.labels['osac.openshift.io/publicippool'] == test_pool_name
              - ipaddresspool_result.resources[0].metadata.labels['osac.openshift.io/managed-by'] == 'osac-fulfillment'
            fail_msg: "IPAddressPool labels incorrect"
            success_msg: "IPAddressPool labels correct"

        - name: Fetch L2Advertisement
          kubernetes.core.k8s_info:
            api_version: metallb.io/v1beta1
            kind: L2Advertisement
            name: "{{ test_pool_name }}-l2adv"
            namespace: metallb-system
          register: l2advertisement_result

        - name: Verify L2Advertisement exists and references IPAddressPool
          ansible.builtin.assert:
            that:
              - l2advertisement_result.resources | length == 1
              - test_pool_name in l2advertisement_result.resources[0].spec.ipAddressPools
            fail_msg: "L2Advertisement not created correctly"
            success_msg: "L2Advertisement '{{ test_pool_name }}-l2adv' created referencing correct pool"

        - name: Verify L2Advertisement labels
          ansible.builtin.assert:
            that:
              - l2advertisement_result.resources[0].metadata.labels['osac.openshift.io/publicippool'] == test_pool_name
              - l2advertisement_result.resources[0].metadata.labels['osac.openshift.io/managed-by'] == 'osac-fulfillment'
            fail_msg: "L2Advertisement labels incorrect"
            success_msg: "L2Advertisement labels correct"

      always:
        - name: Clean up IPAddressPool on failure
          kubernetes.core.k8s:
            api_version: metallb.io/v1beta1
            kind: IPAddressPool
            name: "{{ test_pool_name }}"
            namespace: metallb-system
            state: absent
          when: ansible_failed_result is defined
          ignore_errors: true

        - name: Clean up L2Advertisement on failure
          kubernetes.core.k8s:
            api_version: metallb.io/v1beta1
            kind: L2Advertisement
            name: "{{ test_pool_name }}-l2adv"
            namespace: metallb-system
            state: absent
          when: ansible_failed_result is defined
          ignore_errors: true

# ──────────────────────────────────────────────────────────────
# Test: Create PublicIP (LoadBalancer Service)
# Expected: LB Service created in metallb-system with correct
#   annotations, labels, placeholder port, and assigned IP.
# Prerequisite: IPAddressPool must exist (run pool create first).
# ──────────────────────────────────────────────────────────────
- name: Test metallb_l2 role -- create PublicIP resources
  hosts: localhost
  gather_facts: false
  environment:
    K8S_AUTH_IMPERSONATE_USER: "{{ test_impersonate_user | default('') }}"

  vars:
    test_ip_name: "test-publicip-id"
    test_pool_name: "test-metallb-pool"
    public_ip:
      metadata:
        name: "{{ test_ip_name }}"
        annotations:
          osac.openshift.io/publicippool-name: "{{ test_pool_name }}"

  tasks:
    - name: Run PublicIP create tests
      when: run_create_ip | default(true) | bool
      block:
        - name: Check LB Service does not already exist
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}"
            namespace: metallb-system
          register: pre_create_svc

        - name: Assert clean state before PublicIP create
          ansible.builtin.assert:
            that:
              - pre_create_svc.resources | length == 0
            fail_msg: >-
              Stale LB Service exists from a previous run. Clean up with:
              oc delete svc osac-pip-{{ test_ip_name }} -n metallb-system --ignore-not-found
            success_msg: "No stale LB Service, proceeding with create"

        - name: Create PublicIP via metallb_l2 role
          ansible.builtin.include_role:
            name: osac.templates.metallb_l2
            tasks_from: create_public_ip

        - name: Fetch LoadBalancer Service
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}"
            namespace: metallb-system
          register: lb_svc_result

        - name: Verify LoadBalancer Service exists with correct spec
          ansible.builtin.assert:
            that:
              - lb_svc_result.resources | length == 1
              - lb_svc_result.resources[0].spec.type == "LoadBalancer"
              - lb_svc_result.resources[0].spec.ports[0].port == 65535
              - lb_svc_result.resources[0].spec.ports[0].name == "placeholder"
              - lb_svc_result.resources[0].spec.selector | default({}) | length == 0
            fail_msg: "LoadBalancer Service not created correctly"
            success_msg: "LoadBalancer Service 'osac-pip-{{ test_ip_name }}' created with correct spec"

        - name: Verify LoadBalancer Service annotations
          ansible.builtin.assert:
            that:
              - lb_svc_result.resources[0].metadata.annotations['metallb.universe.tf/address-pool'] == test_pool_name
            fail_msg: "LoadBalancer Service address-pool annotation incorrect"
            success_msg: "LoadBalancer Service address-pool annotation correct"

        - name: Verify LoadBalancer Service labels
          ansible.builtin.assert:
            that:
              - lb_svc_result.resources[0].metadata.labels['osac.openshift.io/publicip'] == test_ip_name
              - lb_svc_result.resources[0].metadata.labels['osac.openshift.io/managed-by'] == 'osac-fulfillment'
            fail_msg: "LoadBalancer Service labels incorrect"
            success_msg: "LoadBalancer Service labels correct"

        - name: Verify IP was assigned by MetalLB
          ansible.builtin.assert:
            that:
              - lb_svc_result.resources[0].status.loadBalancer.ingress | default([]) | length > 0
              - lb_svc_result.resources[0].status.loadBalancer.ingress[0].ip is defined
              - lb_svc_result.resources[0].status.loadBalancer.ingress[0].ip | length > 0
            fail_msg: "MetalLB did not assign an IP to the LoadBalancer Service"
            success_msg: >-
              MetalLB assigned IP
              '{{ lb_svc_result.resources[0].status.loadBalancer.ingress[0].ip }}'

      always:
        - name: Clean up LoadBalancer Service on failure
          kubernetes.core.k8s:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}"
            namespace: metallb-system
            state: absent
          when: ansible_failed_result is defined
          ignore_errors: true

# ──────────────────────────────────────────────────────────────
# Test: Delete PublicIP (LoadBalancer Service)
# Expected: Service deleted from metallb-system.
# ──────────────────────────────────────────────────────────────
- name: Test metallb_l2 role -- delete PublicIP resources
  hosts: localhost
  gather_facts: false
  environment:
    K8S_AUTH_IMPERSONATE_USER: "{{ test_impersonate_user | default('') }}"

  vars:
    test_ip_name: "test-publicip-id"
    public_ip:
      metadata:
        name: "{{ test_ip_name }}"

  tasks:
    - name: Run PublicIP delete tests
      when: run_delete_ip | default(true) | bool
      block:
        - name: Verify LB Service exists before delete
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}"
            namespace: metallb-system
          register: pre_delete_svc

        - name: Assert LB Service exists (otherwise delete test is meaningless)
          ansible.builtin.assert:
            that:
              - pre_delete_svc.resources | length == 1
            fail_msg: "LB Service does not exist before delete. Run PublicIP create test first or run all tests together."
            success_msg: "LB Service exists, proceeding with delete"

        - name: Delete PublicIP via metallb_l2 role
          ansible.builtin.include_role:
            name: osac.templates.metallb_l2
            tasks_from: delete_public_ip

        - name: Verify LB Service is gone
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}"
            namespace: metallb-system
          register: svc_after_delete

        - name: Assert LB Service deleted
          ansible.builtin.assert:
            that:
              - svc_after_delete.resources | length == 0
            fail_msg: "LB Service still exists after delete"
            success_msg: "LB Service 'osac-pip-{{ test_ip_name }}' successfully deleted"

# ──────────────────────────────────────────────────────────────
# Test: Delete PublicIP when already gone (NotFound handling)
# Expected: No failure. The role tolerates already-deleted resources.
# ──────────────────────────────────────────────────────────────
- name: Test metallb_l2 role -- delete PublicIP tolerates NotFound
  hosts: localhost
  gather_facts: false
  environment:
    K8S_AUTH_IMPERSONATE_USER: "{{ test_impersonate_user | default('') }}"

  vars:
    test_ip_name: "test-publicip"
    public_ip:
      metadata:
        name: "{{ test_ip_name }}"

  tasks:
    - name: Run PublicIP delete-not-found test
      when: run_delete_ip_not_found | default(true) | bool
      block:
        - name: Verify LB Service is absent before NotFound test
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}"
            namespace: metallb-system
          register: pre_notfound_svc

        - name: Assert LB Service is absent (otherwise this is not a NotFound test)
          ansible.builtin.assert:
            that:
              - pre_notfound_svc.resources | length == 0
            fail_msg: "LB Service still exists. Run delete tests first or clean up manually."
            success_msg: "LB Service absent, proceeding with NotFound test"

        - name: Delete already-gone PublicIP (should not fail)
          ansible.builtin.include_role:
            name: osac.templates.metallb_l2
            tasks_from: delete_public_ip

        - name: Confirm no failure occurred
          ansible.builtin.debug:
            msg: "PublicIP delete-not-found test passed: role tolerated already-deleted LB Service"

# ──────────────────────────────────────────────────────────────
# Test: Delete IPAddressPool and L2Advertisement
# Expected: Both resources deleted. L2Advertisement deleted first.
# ──────────────────────────────────────────────────────────────
- name: Test metallb_l2 role -- delete PublicIPPool resources
  hosts: localhost
  gather_facts: false
  environment:
    K8S_AUTH_IMPERSONATE_USER: "{{ test_impersonate_user | default('') }}"

  vars:
    test_pool_name: "test-metallb-pool"
    public_ip_pool_name: "{{ test_pool_name }}"
    public_ip_pool:
      metadata:
        name: "{{ test_pool_name }}"

  tasks:
    - name: Run delete tests
      when: run_delete | default(true) | bool
      block:
        - name: Verify IPAddressPool exists before delete
          kubernetes.core.k8s_info:
            api_version: metallb.io/v1beta1
            kind: IPAddressPool
            name: "{{ test_pool_name }}"
            namespace: metallb-system
          register: pre_delete_pool

        - name: Verify L2Advertisement exists before delete
          kubernetes.core.k8s_info:
            api_version: metallb.io/v1beta1
            kind: L2Advertisement
            name: "{{ test_pool_name }}-l2adv"
            namespace: metallb-system
          register: pre_delete_l2adv

        - name: Assert resources exist (otherwise delete test is meaningless)
          ansible.builtin.assert:
            that:
              - pre_delete_pool.resources | length == 1
              - pre_delete_l2adv.resources | length == 1
            fail_msg: "Resources do not exist before delete. Run create tests first or run all tests together."
            success_msg: "Both resources exist, proceeding with delete"

        - name: Delete MetalLB resources via metallb_l2 role
          ansible.builtin.include_role:
            name: osac.templates.metallb_l2
            tasks_from: delete_public_ip_pool

        - name: Verify IPAddressPool is gone
          kubernetes.core.k8s_info:
            api_version: metallb.io/v1beta1
            kind: IPAddressPool
            name: "{{ test_pool_name }}"
            namespace: metallb-system
          register: ipaddresspool_after_delete

        - name: Assert IPAddressPool deleted
          ansible.builtin.assert:
            that:
              - ipaddresspool_after_delete.resources | length == 0
            fail_msg: "IPAddressPool still exists after delete"
            success_msg: "IPAddressPool '{{ test_pool_name }}' successfully deleted"

        - name: Verify L2Advertisement is gone
          kubernetes.core.k8s_info:
            api_version: metallb.io/v1beta1
            kind: L2Advertisement
            name: "{{ test_pool_name }}-l2adv"
            namespace: metallb-system
          register: l2adv_after_delete

        - name: Assert L2Advertisement deleted
          ansible.builtin.assert:
            that:
              - l2adv_after_delete.resources | length == 0
            fail_msg: "L2Advertisement still exists after delete"
            success_msg: "L2Advertisement '{{ test_pool_name }}-l2adv' successfully deleted"

# ──────────────────────────────────────────────────────────────
# Test: Delete when resources already gone (NotFound handling)
# Expected: No failure. The role tolerates already-deleted resources.
# ──────────────────────────────────────────────────────────────
- name: Test metallb_l2 role -- delete tolerates NotFound
  hosts: localhost
  gather_facts: false
  environment:
    K8S_AUTH_IMPERSONATE_USER: "{{ test_impersonate_user | default('') }}"

  vars:
    test_pool_name: "test-metallb-pool"
    public_ip_pool_name: "{{ test_pool_name }}"
    public_ip_pool:
      metadata:
        name: "{{ test_pool_name }}"

  tasks:
    - name: Run delete-not-found test
      when: run_delete_not_found | default(true) | bool
      block:
        - name: Verify IPAddressPool is absent before NotFound test
          kubernetes.core.k8s_info:
            api_version: metallb.io/v1beta1
            kind: IPAddressPool
            name: "{{ test_pool_name }}"
            namespace: metallb-system
          register: pre_notfound_pool

        - name: Verify L2Advertisement is absent before NotFound test
          kubernetes.core.k8s_info:
            api_version: metallb.io/v1beta1
            kind: L2Advertisement
            name: "{{ test_pool_name }}-l2adv"
            namespace: metallb-system
          register: pre_notfound_l2adv

        - name: Assert resources are absent (otherwise this is not a NotFound test)
          ansible.builtin.assert:
            that:
              - pre_notfound_pool.resources | length == 0
              - pre_notfound_l2adv.resources | length == 0
            fail_msg: "Resources still exist. Run delete tests first or clean up manually."
            success_msg: "Both resources absent, proceeding with NotFound test"

        - name: Delete already-gone resources (should not fail)
          ansible.builtin.include_role:
            name: osac.templates.metallb_l2
            tasks_from: delete_public_ip_pool

        - name: Confirm no failure occurred
          ansible.builtin.debug:
            msg: "Delete-not-found test passed: role tolerated already-deleted resources"

# ──────────────────────────────────────────────────────────────
# Test: Attach PublicIP to a ComputeInstance
# Expected:
#   - Parking Service deleted from metallb-system
#   - LoadBalancer Service created in VM namespace with correct
#     selector, labels, annotations, and the reserved IP
#   - ComputeInstance annotated with public-ip-address
# Prerequisites:
#   - IPAddressPool exists (run pool create first or run all tests)
#   - ComputeInstance CRD installed (osac.openshift.io/v1alpha1)
# ──────────────────────────────────────────────────────────────
- name: Test metallb_l2 role -- attach PublicIP to ComputeInstance
  hosts: localhost
  gather_facts: false
  environment:
    K8S_AUTH_IMPERSONATE_USER: "{{ test_impersonate_user | default('') }}"

  vars:
    test_ip_name: "test-publicip-id"
    test_pool_name: "test-metallb-pool"
    test_vm_namespace: "test-publicip-vm-ns"
    test_ci_name: "test-compute-instance"
    test_ci_namespace: "default"
    test_ci_uuid: "a1b2c3d4-0000-0000-0000-test-ci-uuid"
    public_ip:
      metadata:
        name: "{{ test_ip_name }}"
        namespace: "{{ test_ci_namespace }}"
        annotations:
          osac.openshift.io/publicippool-name: "{{ test_pool_name }}"
          osac.openshift.io/publicip-target-namespace: "{{ test_vm_namespace }}"
      spec:
        computeInstance: "{{ test_ci_uuid }}"

  tasks:
    - name: Run attach tests
      when: run_attach | default(true) | bool
      block:
        - name: Create VM target namespace
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: "{{ test_vm_namespace }}"

        - name: Create ComputeInstance fixture CR
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: osac.openshift.io/v1alpha1
              kind: ComputeInstance
              metadata:
                name: "{{ test_ci_name }}"
                namespace: "{{ test_ci_namespace }}"
                labels:
                  osac.openshift.io/computeinstance-uuid: "{{ test_ci_uuid }}"
              spec:
                templateID: osac.templates.ocp_virt_vm
                cores: 2
                memoryGiB: 4
                bootDisk:
                  sizeGiB: 20
                image:
                  sourceType: registry
                  sourceRef: "quay.io/containerdisks/fedora:latest"
                runStrategy: "Always"

        - name: Create parking Service in metallb-system (simulate pre-existing PublicIP)
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Service
              metadata:
                name: "osac-pip-{{ test_ip_name }}"
                namespace: metallb-system
                annotations:
                  metallb.universe.tf/address-pool: "{{ test_pool_name }}"
                labels:
                  osac.openshift.io/publicip: "{{ test_ip_name }}"
                  osac.openshift.io/managed-by: osac-fulfillment
              spec:
                type: LoadBalancer
                selector: {}
                ports:
                  - name: placeholder
                    protocol: TCP
                    port: 65535
                    targetPort: 65535
          register: parking_svc_create
          retries: 60
          delay: 10
          until: parking_svc_create is successful

        - name: Wait for MetalLB to assign IP to parking Service
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}"
            namespace: metallb-system
          register: parking_svc_info
          retries: 60
          delay: 10
          until: >-
            parking_svc_info.resources | length > 0 and
            parking_svc_info.resources[0].status.loadBalancer.ingress | default([]) | length > 0

        - name: Record IP assigned to parking Service
          ansible.builtin.set_fact:
            pre_attach_ip: "{{ parking_svc_info.resources[0].status.loadBalancer.ingress[0].ip }}"

        - name: Assert clean state -- LB Service not yet in VM namespace
          block:
            - name: Check LB Service absent from VM namespace before attach
              kubernetes.core.k8s_info:
                api_version: v1
                kind: Service
                name: "osac-pip-{{ test_ip_name }}-ingress"
                namespace: "{{ test_vm_namespace }}"
              register: pre_attach_lb_svc

            - name: Assert LB Service not in VM namespace
              ansible.builtin.assert:
                that:
                  - pre_attach_lb_svc.resources | length == 0
                fail_msg: >-
                  Stale LB Service 'osac-pip-{{ test_ip_name }}-ingress' already exists in '{{ test_vm_namespace }}'.
                  Clean up with: oc delete svc osac-pip-{{ test_ip_name }}-ingress -n {{ test_vm_namespace }} --ignore-not-found
                success_msg: "No stale LB Service in VM namespace, proceeding with attach"

        - name: Run attach_public_ip role
          ansible.builtin.include_role:
            name: osac.templates.metallb_l2
            tasks_from: attach_public_ip

        - name: Verify parking Service deleted from metallb-system
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}"
            namespace: metallb-system
          register: parking_svc_after_attach

        - name: Assert parking Service is gone
          ansible.builtin.assert:
            that:
              - parking_svc_after_attach.resources | length == 0
            fail_msg: "Parking Service still exists in metallb-system after attach"
            success_msg: "Parking Service 'osac-pip-{{ test_ip_name }}' correctly removed from metallb-system"

        - name: Fetch LoadBalancer Service in VM namespace
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}-ingress"
            namespace: "{{ test_vm_namespace }}"
          register: lb_svc_result

        - name: Verify LB Service created in VM namespace with correct type
          ansible.builtin.assert:
            that:
              - lb_svc_result.resources | length == 1
              - lb_svc_result.resources[0].spec.type == "LoadBalancer"
            fail_msg: "LB Service not created in VM namespace after attach"
            success_msg: "LB Service 'osac-pip-{{ test_ip_name }}-ingress' created in '{{ test_vm_namespace }}'"

        - name: Verify LB Service annotations preserve pool and IP
          ansible.builtin.assert:
            that:
              - lb_svc_result.resources[0].metadata.annotations['metallb.universe.tf/address-pool'] == test_pool_name
              - lb_svc_result.resources[0].metadata.annotations['metallb.universe.tf/loadBalancerIPs'] == pre_attach_ip
            fail_msg: "LB Service annotations (pool or IP) incorrect after attach"
            success_msg: "LB Service annotations correct: pool='{{ test_pool_name }}' ip='{{ pre_attach_ip }}'"

        - name: Verify LB Service labels
          ansible.builtin.assert:
            that:
              - lb_svc_result.resources[0].metadata.labels['osac.openshift.io/publicip'] == test_ip_name
              - lb_svc_result.resources[0].metadata.labels['osac.openshift.io/managed-by'] == 'osac-fulfillment'
            fail_msg: "LB Service labels incorrect after attach"
            success_msg: "LB Service labels correct"

        - name: Verify LB Service VM selector
          ansible.builtin.assert:
            that:
              - lb_svc_result.resources[0].spec.selector['vm.kubevirt.io/name'] == test_ci_name
            fail_msg: "LB Service selector does not target the correct VM"
            success_msg: "LB Service selector targets VM '{{ test_ci_name }}'"

        - name: Fetch ComputeInstance to verify annotation
          kubernetes.core.k8s_info:
            api_version: osac.openshift.io/v1alpha1
            kind: ComputeInstance
            name: "{{ test_ci_name }}"
            namespace: "{{ test_ci_namespace }}"
          register: ci_after_attach

        - name: Verify ComputeInstance annotated with public-ip-address
          ansible.builtin.assert:
            that:
              - ci_after_attach.resources | length == 1
              - (ci_after_attach.resources[0].metadata.annotations | default({}))['osac.openshift.io/public-ip-address'] == pre_attach_ip
            fail_msg: "ComputeInstance not annotated with public-ip-address after attach"
            success_msg: >-
              ComputeInstance '{{ test_ci_name }}' annotated with
              public-ip-address='{{ pre_attach_ip }}'

      always:
        - name: Clean up LB Service from VM namespace on failure
          kubernetes.core.k8s:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}-ingress"
            namespace: "{{ test_vm_namespace }}"
            state: absent
          when: ansible_failed_result is defined
          ignore_errors: true

        - name: Clean up parking Service from metallb-system on failure
          kubernetes.core.k8s:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}"
            namespace: metallb-system
            state: absent
          when: ansible_failed_result is defined
          ignore_errors: true

        - name: Clean up ComputeInstance fixture on failure
          kubernetes.core.k8s:
            api_version: osac.openshift.io/v1alpha1
            kind: ComputeInstance
            name: "{{ test_ci_name }}"
            namespace: "{{ test_ci_namespace }}"
            state: absent
          when: ansible_failed_result is defined
          ignore_errors: true

# ──────────────────────────────────────────────────────────────
# Test: Detach PublicIP from a ComputeInstance
# Expected:
#   - LoadBalancer Service removed from VM namespace
#   - public-ip-address annotation removed from ComputeInstance
#   - Parking Service re-created in metallb-system with the same IP
# Prerequisites:
#   - attach test must have run (or LB Service + annotated ComputeInstance
#     must exist in the test VM namespace)
# ──────────────────────────────────────────────────────────────
- name: Test metallb_l2 role -- detach PublicIP from ComputeInstance
  hosts: localhost
  gather_facts: false
  environment:
    K8S_AUTH_IMPERSONATE_USER: "{{ test_impersonate_user | default('') }}"

  vars:
    test_ip_name: "test-publicip-id"
    test_pool_name: "test-metallb-pool"
    test_vm_namespace: "test-publicip-vm-ns"
    test_ci_name: "test-compute-instance"
    test_ci_namespace: "default"
    test_ci_uuid: "a1b2c3d4-0000-0000-0000-test-ci-uuid"
    public_ip:
      metadata:
        name: "{{ test_ip_name }}"
        namespace: "{{ test_ci_namespace }}"
        annotations:
          osac.openshift.io/publicippool-name: "{{ test_pool_name }}"
          osac.openshift.io/publicip-target-namespace: "{{ test_vm_namespace }}"
      spec:
        computeInstance: "{{ test_ci_uuid }}"

  tasks:
    - name: Run detach tests
      when: run_detach | default(true) | bool
      block:
        - name: Verify LB Service exists in VM namespace before detach
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}-ingress"
            namespace: "{{ test_vm_namespace }}"
          register: pre_detach_lb_svc

        - name: Assert LB Service exists (otherwise detach test is meaningless)
          ansible.builtin.assert:
            that:
              - pre_detach_lb_svc.resources | length == 1
              - pre_detach_lb_svc.resources[0].status.loadBalancer.ingress | default([]) | length > 0
            fail_msg: >-
              LB Service 'osac-pip-{{ test_ip_name }}-ingress' not found in '{{ test_vm_namespace }}' or has no IP.
              Run the attach test first or run all tests together.
            success_msg: "LB Service exists with IP, proceeding with detach"

        - name: Record IP held by LB Service
          ansible.builtin.set_fact:
            pre_detach_ip: "{{ pre_detach_lb_svc.resources[0].status.loadBalancer.ingress[0].ip }}"

        - name: Run detach_public_ip role
          ansible.builtin.include_role:
            name: osac.templates.metallb_l2
            tasks_from: detach_public_ip

        - name: Verify LB Service deleted from VM namespace
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}-ingress"
            namespace: "{{ test_vm_namespace }}"
          register: lb_svc_after_detach

        - name: Assert LB Service is gone from VM namespace
          ansible.builtin.assert:
            that:
              - lb_svc_after_detach.resources | length == 0
            fail_msg: "LB Service still exists in VM namespace after detach"
            success_msg: "LB Service 'osac-pip-{{ test_ip_name }}-ingress' correctly removed from '{{ test_vm_namespace }}'"

        - name: Fetch ComputeInstance to verify annotation removed
          kubernetes.core.k8s_info:
            api_version: osac.openshift.io/v1alpha1
            kind: ComputeInstance
            name: "{{ test_ci_name }}"
            namespace: "{{ test_ci_namespace }}"
          register: ci_after_detach

        - name: Assert public-ip-address annotation removed from ComputeInstance
          ansible.builtin.assert:
            that:
              - ci_after_detach.resources | length == 1
              - >-
                (ci_after_detach.resources[0].metadata.annotations | default({}))
                ['osac.openshift.io/public-ip-address'] is not defined
            fail_msg: "public-ip-address annotation still present on ComputeInstance after detach"
            success_msg: "public-ip-address annotation correctly removed from ComputeInstance '{{ test_ci_name }}'"

        - name: Wait for parking Service to be re-created in metallb-system
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}"
            namespace: metallb-system
          register: parking_svc_after_detach
          retries: 60
          delay: 10
          until: >-
            parking_svc_after_detach.resources | length > 0 and
            parking_svc_after_detach.resources[0].status.loadBalancer.ingress | default([]) | length > 0

        - name: Verify parking Service spec is a placeholder (empty selector)
          ansible.builtin.assert:
            that:
              - parking_svc_after_detach.resources[0].spec.type == "LoadBalancer"
              - parking_svc_after_detach.resources[0].spec.selector | default({}) | length == 0
            fail_msg: "Re-created parking Service has incorrect spec after detach"
            success_msg: "Parking Service 'osac-pip-{{ test_ip_name }}' re-created with correct placeholder spec"

        - name: Verify parking Service preserves the same IP
          ansible.builtin.assert:
            that:
              - parking_svc_after_detach.resources[0].status.loadBalancer.ingress[0].ip == pre_detach_ip
            fail_msg: >-
              Parking Service IP '{{ parking_svc_after_detach.resources[0].status.loadBalancer.ingress[0].ip }}'
              does not match the original IP '{{ pre_detach_ip }}'
            success_msg: "Parking Service correctly preserved IP '{{ pre_detach_ip }}'"

        - name: Verify parking Service labels
          ansible.builtin.assert:
            that:
              - parking_svc_after_detach.resources[0].metadata.labels['osac.openshift.io/publicip'] == test_ip_name
              - parking_svc_after_detach.resources[0].metadata.labels['osac.openshift.io/managed-by'] == 'osac-fulfillment'
            fail_msg: "Re-created parking Service labels incorrect after detach"
            success_msg: "Parking Service labels correct"

      always:
        - name: Clean up parking Service from metallb-system
          kubernetes.core.k8s:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}"
            namespace: metallb-system
            state: absent
          ignore_errors: true

        - name: Clean up ComputeInstance fixture
          kubernetes.core.k8s:
            api_version: osac.openshift.io/v1alpha1
            kind: ComputeInstance
            name: "{{ test_ci_name }}"
            namespace: "{{ test_ci_namespace }}"
            state: absent
          ignore_errors: true

        - name: Clean up VM target namespace
          kubernetes.core.k8s:
            api_version: v1
            kind: Namespace
            name: "{{ test_vm_namespace }}"
            state: absent
          ignore_errors: true

# ──────────────────────────────────────────────────────────────
# Test: Detach PublicIP without spec.computeInstance
# Expected:
#   - Detach succeeds using LB Service selector to resolve VM name
#   - LoadBalancer Service removed from VM namespace
#   - Parking Service re-created in metallb-system with the same IP
#   - CI annotation cleanup skipped (CI not identifiable)
# This covers the normal operator flow where spec.computeInstance
# is cleared before the AAP detach job runs.
# Prerequisites:
#   - ComputeInstance CRD installed (osac.openshift.io/v1alpha1)
# ──────────────────────────────────────────────────────────────
- name: Test metallb_l2 role -- detach PublicIP without spec.computeInstance
  hosts: localhost
  gather_facts: false
  environment:
    K8S_AUTH_IMPERSONATE_USER: "{{ test_impersonate_user | default('') }}"

  vars:
    test_ip_name: "test-publicip-no-ci"
    test_pool_name: "test-metallb-pool"
    test_vm_namespace: "test-publicip-vm-ns-no-ci"
    test_vm_name: "test-vm-for-detach"
    public_ip:
      metadata:
        name: "{{ test_ip_name }}"
        namespace: "default"
        annotations:
          osac.openshift.io/publicippool-name: "{{ test_pool_name }}"
          osac.openshift.io/publicip-target-namespace: "{{ test_vm_namespace }}"
      spec: {}

  tasks:
    - name: Run detach-without-computeInstance tests
      when: run_detach_no_ci | default(true) | bool
      block:
        - name: Create VM target namespace
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Namespace
              metadata:
                name: "{{ test_vm_namespace }}"

        - name: Create LB Service in VM namespace (simulate attached state)
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Service
              metadata:
                name: "osac-pip-{{ test_ip_name }}-ingress"
                namespace: "{{ test_vm_namespace }}"
                annotations:
                  metallb.universe.tf/address-pool: "{{ test_pool_name }}"
                  metallb.universe.tf/loadBalancerIPs: "192.168.100.10"
                labels:
                  osac.openshift.io/publicip: "{{ test_ip_name }}"
                  osac.openshift.io/managed-by: osac-fulfillment
              spec:
                type: LoadBalancer
                selector:
                  vm.kubevirt.io/name: "{{ test_vm_name }}"
                ports:
                  - name: ssh
                    port: 22
                    targetPort: 22
                    protocol: TCP
          register: lb_svc_create
          retries: 60
          delay: 10
          until: lb_svc_create is successful

        - name: Wait for MetalLB to assign IP to LB Service
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}-ingress"
            namespace: "{{ test_vm_namespace }}"
          register: lb_svc_info
          retries: 60
          delay: 10
          until: >-
            lb_svc_info.resources | length > 0 and
            lb_svc_info.resources[0].status.loadBalancer.ingress | default([]) | length > 0

        - name: Record IP assigned to LB Service
          ansible.builtin.set_fact:
            pre_detach_ip: "{{ lb_svc_info.resources[0].status.loadBalancer.ingress[0].ip }}"

        - name: Run detach_public_ip role (without spec.computeInstance)
          ansible.builtin.include_role:
            name: osac.templates.metallb_l2
            tasks_from: detach_public_ip

        - name: Verify LB Service deleted from VM namespace
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}-ingress"
            namespace: "{{ test_vm_namespace }}"
          register: lb_svc_after_detach

        - name: Assert LB Service is gone from VM namespace
          ansible.builtin.assert:
            that:
              - lb_svc_after_detach.resources | length == 0
            fail_msg: "LB Service still exists in VM namespace after detach (no-CI path)"
            success_msg: "LB Service correctly removed from '{{ test_vm_namespace }}' (no-CI path)"

        - name: Wait for parking Service to be re-created in metallb-system
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}"
            namespace: metallb-system
          register: parking_svc_after_detach
          retries: 60
          delay: 10
          until: >-
            parking_svc_after_detach.resources | length > 0 and
            parking_svc_after_detach.resources[0].status.loadBalancer.ingress | default([]) | length > 0

        - name: Verify parking Service is a placeholder (empty selector)
          ansible.builtin.assert:
            that:
              - parking_svc_after_detach.resources[0].spec.type == "LoadBalancer"
              - parking_svc_after_detach.resources[0].spec.selector | default({}) | length == 0
            fail_msg: "Re-created parking Service has incorrect spec after detach (no-CI path)"
            success_msg: "Parking Service re-created with correct placeholder spec (no-CI path)"

        - name: Verify parking Service preserves the same IP
          ansible.builtin.assert:
            that:
              - parking_svc_after_detach.resources[0].status.loadBalancer.ingress[0].ip == pre_detach_ip
            fail_msg: >-
              Parking Service IP does not match the original IP '{{ pre_detach_ip }}'
            success_msg: "Parking Service correctly preserved IP '{{ pre_detach_ip }}' (no-CI path)"

      always:
        - name: Clean up parking Service from metallb-system
          kubernetes.core.k8s:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}"
            namespace: metallb-system
            state: absent
          ignore_errors: true

        - name: Clean up LB Service from VM namespace
          kubernetes.core.k8s:
            api_version: v1
            kind: Service
            name: "osac-pip-{{ test_ip_name }}-ingress"
            namespace: "{{ test_vm_namespace }}"
            state: absent
          ignore_errors: true

        - name: Clean up VM target namespace
          kubernetes.core.k8s:
            api_version: v1
            kind: Namespace
            name: "{{ test_vm_namespace }}"
            state: absent
          ignore_errors: true
