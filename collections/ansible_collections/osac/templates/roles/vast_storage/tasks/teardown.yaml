---
# VAST teardown: multi-tier cleanup with per-tenant user deletion.
# Two-format tier parser supports both new JSON array and legacy single-field hub Secrets.

- name: Fail if provisioning target is not yet supported
  when: _provisioning_target != 'vmaas'
  ansible.builtin.fail:
    msg: >-
      VAST storage provisioning for target '{{ _provisioning_target }}' is not yet
      implemented. Only 'vmaas' is currently supported.

- name: Validate tenant_name is a valid DNS label
  ansible.builtin.fail:
    msg: "tenant_name '{{ tenant_name }}' is not a valid DNS label."
  when: tenant_name is not regex('^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$')

- name: Read tenant config Secret from hub cluster
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ vast_storage_tenant_config_secret_prefix }}{{ tenant_name }}"
    namespace: "{{ vast_storage_config_namespace }}"
  register: _vast_teardown_config
  no_log: true
  failed_when: false

# Two-format tier parser: new JSON array vs legacy single-field
- name: Parse tier list from hub Secret (new format)
  when:
    - _vast_teardown_config.resources | length > 0
    - _vast_teardown_config.resources[0].data.storage_tiers is defined
    - (_vast_teardown_config.resources[0].data.storage_tiers | b64decode | trim) is regex('^\[')
  ansible.builtin.set_fact:
    _vast_teardown_tiers: "{{ _vast_teardown_config.resources[0].data.storage_tiers | b64decode | trim | from_json }}"
  no_log: true

- name: Parse tier list from hub Secret (legacy single-field format)
  when:
    - _vast_teardown_config.resources | length > 0
    - _vast_teardown_tiers is not defined
    - _vast_teardown_config.resources[0].data.storage_tier is defined
  ansible.builtin.set_fact:
    _vast_teardown_tiers:
      - name: "{{ _vast_teardown_config.resources[0].data.storage_tier | b64decode }}"
        protocol: "{{ (_vast_teardown_config.resources[0].data.storage_protocol | default('') | b64decode) | default('nfs', true) }}"
  no_log: true

- name: Use deterministic defaults when Secret is missing
  when: _vast_teardown_config.resources | length == 0
  ansible.builtin.set_fact:
    _vast_teardown_tiers:
      - name: default
        protocol: nfs

- name: Cleanup VAST resources
  block:
    - name: Resolve VAST admin credentials for VMS API cleanup
      ansible.builtin.include_tasks: read_credentials.yaml

    - name: Build VAST VMS connection dict (cluster-scoped)
      ansible.builtin.set_fact:
        _vast_vms_conn:
          host: "{{ vast_endpoint }}"
          username: "{{ vast_username }}"
          password: "{{ vast_password }}"
          validate_certs: "{{ vast_storage_validate_certs }}"
          timeout: "{{ vast_storage_api_timeout }}"
      no_log: true

    - name: Delete VolumeSnapshotClasses per tier (new naming)
      kubernetes.core.k8s:
        state: absent
        api_version: snapshot.storage.k8s.io/v1
        kind: VolumeSnapshotClass
        name: "vast-snapshot-{{ tenant_name }}-{{ item.name }}"
      loop: "{{ _vast_teardown_tiers }}"
      loop_control:
        label: "vast-snapshot-{{ tenant_name }}-{{ item.name }}"
      ignore_errors: true  # noqa: ignore-errors
      register: _vast_teardown_vsc_results

    - name: Delete legacy VolumeSnapshotClass (pre-refactor naming)
      kubernetes.core.k8s:
        state: absent
        api_version: snapshot.storage.k8s.io/v1
        kind: VolumeSnapshotClass
        name: "vast-snapshot-{{ tenant_name }}"
      ignore_errors: true  # noqa: ignore-errors

    - name: Delete CSI Secret in tenant namespace
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Secret
        name: "vast-csi-{{ tenant_name }}"
        namespace: "{{ tenant_namespace }}"
      ignore_errors: true  # noqa: ignore-errors
      no_log: true

    - name: Delete per-tier QoS policies
      ansible.builtin.include_tasks: delete_qos_policy.yaml

    - name: Delete VAST quotas per tier
      vastdata.vms.quotas:
        vms: "{{ _vast_vms_conn }}"
        name: "quota-{{ tenant_name }}-{{ item.name }}"
        state: absent
      loop: "{{ _vast_teardown_tiers }}"
      loop_control:
        label: "quota-{{ tenant_name }}-{{ item.name }}"
      ignore_errors: true  # noqa: ignore-errors
      no_log: true

    - name: Delete VAST views per tier
      vastdata.vms.views:
        vms: "{{ _vast_vms_conn }}"
        name: "view-{{ tenant_name }}-{{ item.name }}"
        path: "/osac/{{ tenant_name }}/{{ item.name }}"
        state: absent
        force: true
      loop: "{{ _vast_teardown_tiers }}"
      loop_control:
        label: "view-{{ tenant_name }}-{{ item.name }}"
      ignore_errors: true  # noqa: ignore-errors
      register: _vast_teardown_view_results
      no_log: true

    - name: Delete StorageClasses per tier (new naming)
      kubernetes.core.k8s:
        state: absent
        api_version: storage.k8s.io/v1
        kind: StorageClass
        name: "vast-{{ item.protocol }}-{{ tenant_name }}-{{ item.name }}"
      loop: "{{ _vast_teardown_tiers }}"
      loop_control:
        label: "vast-{{ item.protocol }}-{{ tenant_name }}-{{ item.name }}"
      ignore_errors: true  # noqa: ignore-errors

    - name: Delete legacy StorageClass (pre-refactor naming)
      kubernetes.core.k8s:
        state: absent
        api_version: storage.k8s.io/v1
        kind: StorageClass
        name: "vast-{{ item.protocol }}-{{ tenant_name }}"
      loop: "{{ _vast_teardown_tiers }}"
      loop_control:
        label: "vast-{{ item.protocol }}-{{ tenant_name }}"
      ignore_errors: true  # noqa: ignore-errors

    - name: Delete per-tenant view policy
      ansible.builtin.include_tasks: delete_view_policy.yaml

    - name: Delete per-tenant VMS manager
      ansible.builtin.include_tasks: delete_tenant_manager.yaml

    - name: Delete VAST tenant
      vastdata.vms.tenants:
        vms: "{{ _vast_vms_conn }}"
        name: "{{ tenant_name }}"
        state: absent
        force_remove: true
      ignore_errors: true  # noqa: ignore-errors
      register: _vast_teardown_tenant_result
      no_log: true

    - name: Set VAST cleanup success flag
      ansible.builtin.set_fact:
        _vast_teardown_clean: >-
          {{ not (_vast_teardown_view_results.results | default([]) | selectattr('failed', 'defined') | selectattr('failed') | list | length > 0)
             and not (_vast_teardown_tenant_result.failed | default(false))
             and not (_vast_manager_delete_failed | default(false))
             and not (_vast_view_policy_delete_failed | default(false))
             and not (_vast_qos_policy_delete_failed | default(false)) }}

    - name: Delete tenant config Secret from hub cluster (only when cleanup succeeded)
      when: >-
        _vast_teardown_config.resources | length > 0 and
        (_vast_teardown_clean | bool)
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Secret
        name: "{{ vast_storage_tenant_config_secret_prefix }}{{ tenant_name }}"
        namespace: "{{ vast_storage_config_namespace }}"
      no_log: true

    - name: Warn if tenant config Secret preserved due to cleanup failures
      when: >-
        _vast_teardown_config.resources | length > 0 and
        not (_vast_teardown_clean | bool)
      ansible.builtin.debug:
        msg: >-
          Tenant config Secret preserved because one or more resources failed to delete.
          Re-run teardown to retry (idempotent).

  always:
    # Clear all credential facts from play scope
    - name: Clear all credential facts from play scope
      ansible.builtin.set_fact:
        vast_endpoint: ""
        vast_username: ""
        vast_password: ""
        _vast_vms_conn: {}
        _vast_tenant_manager_name: ""
        _vast_tenant_manager_username: ""
        _vast_tenant_manager_password: ""
        _vast_tenant_manager_id: ""
        _vast_tenant_role_id: ""
        _vast_local_provider_id: ""
        _vast_teardown_config: {}
      no_log: true

- name: Report teardown summary
  ansible.builtin.debug:
    msg: >-
      Teardown for tenant '{{ tenant_name }}' complete.
      Views: {{ _vast_teardown_view_results.results | default([]) | length }} processed,
      Tenant: {{ 'ok' if not (_vast_teardown_tenant_result.failed | default(false)) else 'failed' }},
      Manager: {{ 'ok' if not (_vast_manager_delete_failed | default(false)) else 'failed' }},
      ViewPolicy: {{ 'ok' if not (_vast_view_policy_delete_failed | default(false)) else 'failed' }},
      QoS: {{ 'ok' if not (_vast_qos_policy_delete_failed | default(false)) else 'failed' }}.
