---
# Deletes per-tier QoS policies from VAST via REST API during teardown.
# Best-effort cleanup — ignore_errors throughout.
#
# Requires in scope:
#   vast_endpoint              — VMS API hostname
#   vast_username / vast_password — admin credentials
#   vast_storage_validate_certs — TLS validation flag
#   vast_storage_api_timeout   — API timeout (seconds)
#   _vast_teardown_tiers or _provider_tiers — tier list (teardown uses former, setup rollback uses latter)
#
# Sets output fact:
#   _vast_qos_policy_delete_failed

- name: Filter tiers with qos_policy defined
  ansible.builtin.set_fact:
    _vast_qos_teardown_tiers: "{{ (_vast_teardown_tiers | default(_provider_tiers)) | selectattr('qos_policy', 'defined') | list }}"

- name: Skip QoS policy deletion when no tiers define qos_policy
  when: _vast_qos_teardown_tiers | length == 0
  block:
    - name: Set QoS deletion result (nothing to delete)
      ansible.builtin.set_fact:
        _vast_qos_policy_delete_failed: false

    - name: Log QoS policy deletion skip
      ansible.builtin.debug:
        msg: "No tiers define qos_policy — skipping QoS policy deletion."

- name: Delete QoS policies for tiers that define them
  when: _vast_qos_teardown_tiers | length > 0
  block:
    - name: Authenticate to VAST VMS as admin for QoS cleanup
      ansible.builtin.uri:
        url: "https://{{ vast_endpoint }}/api/token/"
        method: POST
        body_format: json
        body:
          username: "{{ vast_username }}"
          password: "{{ vast_password }}"
        validate_certs: "{{ vast_storage_validate_certs }}"
        timeout: "{{ vast_storage_api_timeout | int }}"
        status_code: [200, 201]
      register: _vast_qos_teardown_auth
      ignore_errors: true
      no_log: true

    - name: Skip QoS cleanup if admin auth failed
      when: _vast_qos_teardown_auth is failed
      ansible.builtin.set_fact:
        _vast_qos_policy_delete_failed: true

    - name: Look up and delete QoS policies
      when: _vast_qos_teardown_auth is not failed
      block:
        - name: Look up QoS policies by name
          ansible.builtin.uri:
            url: "https://{{ vast_endpoint }}/api/qospolicies/?name={{ item.qos_policy | urlencode }}"
            method: GET
            headers:
              Authorization: "Bearer {{ _vast_qos_teardown_auth.json.access }}"
            validate_certs: "{{ vast_storage_validate_certs }}"
            timeout: "{{ vast_storage_api_timeout | int }}"
            status_code: [200]
          loop: "{{ _vast_qos_teardown_tiers }}"
          loop_control:
            label: "{{ item.qos_policy }}"
          register: _vast_qos_lookup_results
          ignore_errors: true
          no_log: true

        - name: Delete QoS policies that exist
          ansible.builtin.uri:
            url: "https://{{ vast_endpoint }}/api/qospolicies/{{ item.json[0].id }}/"
            method: DELETE
            headers:
              Authorization: "Bearer {{ _vast_qos_teardown_auth.json.access }}"
            validate_certs: "{{ vast_storage_validate_certs }}"
            timeout: "{{ vast_storage_api_timeout | int }}"
            status_code: [200, 204, 404]
          loop: "{{ _vast_qos_lookup_results.results | default([]) }}"
          loop_control:
            label: "qos-{{ item.item.qos_policy | default('unknown') }}"
          when:
            - item is not failed
            - item.json | default([]) | length > 0
          register: _vast_qos_delete_results
          ignore_errors: true
          no_log: true

        - name: Set QoS deletion result fact
          ansible.builtin.set_fact:
            _vast_qos_policy_delete_failed: >-
              {{ _vast_qos_delete_results.results | default([])
                 | selectattr('failed', 'defined')
                 | selectattr('failed')
                 | list | length > 0 }}

  always:
    - name: Clear QoS teardown auth facts
      ansible.builtin.set_fact:
        _vast_qos_teardown_auth: {}
        _vast_qos_lookup_results: {}
        _vast_qos_delete_results: {}
      no_log: true

  rescue:
    - name: Set QoS deletion failed on unexpected error
      ansible.builtin.set_fact:
        _vast_qos_policy_delete_failed: true

- name: Log QoS policy deletion outcome
  ansible.builtin.debug:
    msg: >-
      QoS policy deletion result:
      {{ 'succeeded' if not (_vast_qos_policy_delete_failed | default(false) | bool) else 'failed (ignored)' }}
