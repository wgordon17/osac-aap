---
# tenant_namespace is a play-level var from the calling playbook (tenant_storage_provision create.yaml).
# Tenant name DNS label validation — only printable ASCII, no path traversal.
# Runs before any VMS API calls to prevent injection into resource names (SDR-004).
- name: Validate tenant name format
  ansible.builtin.assert:
    that:
      - tenant_storage_provision_tenant_name is match('^[a-z0-9]([a-z0-9\-]{0,61}[a-z0-9])?$')
    fail_msg: >-
      Invalid tenant name '{{ tenant_storage_provision_tenant_name }}': must be a valid DNS label
      (lowercase alphanumeric and hyphens, 1-63 characters, no leading/trailing hyphens).

# Parse VAST_STORAGE_TIERS env var here (not in defaults) so JSON errors produce an actionable assert.
- name: Parse VAST_STORAGE_TIERS JSON from environment
  ansible.builtin.set_fact:
    vast_storage_tiers: "{{ _vast_storage_tiers_raw | from_json if _vast_storage_tiers_raw | length > 0 else [] }}"

- name: Validate VAST_STORAGE_TIERS env var is not empty (must be set)
  ansible.builtin.assert:
    that:
      - _vast_storage_tiers_raw | length > 0
    fail_msg: >-
      VAST_STORAGE_TIERS env var is not set or empty.
      Set it to a JSON array in the storage-operations-ig ConfigMap.
      Example: [{"name":"default","protocol":"nfs"}]

# Task 1: Tier list type validation (SDR-016 — validate before any attribute access)
- name: Validate VAST_STORAGE_TIERS is a non-empty list
  ansible.builtin.assert:
    that:
      - vast_storage_tiers is sequence
      - vast_storage_tiers is not string
      - vast_storage_tiers | length > 0
      - vast_storage_tiers | length <= vast_storage_max_tiers
    fail_msg: >-
      VAST_STORAGE_TIERS env var must be a non-empty JSON array with at most
      {{ vast_storage_max_tiers }} tiers.
      Example: [{"name":"default","protocol":"nfs"}]

- name: Validate each tier definition is a mapping with required keys
  ansible.builtin.assert:
    that:
      - item is mapping
      - item.name is defined
      - item.name is match('^[a-z0-9]([a-z0-9\-]{0,61}[a-z0-9])?$') or item.name == 'default'
      - item.protocol is defined
      - item.protocol in ['nfs', 'block']
    fail_msg: >-
      Invalid tier definition at index {{ ansible_loop.index0 }}:
      {{ item | to_json }}. Each tier must have 'name' (DNS label)
      and 'protocol' (nfs or block).
  loop: "{{ vast_storage_tiers }}"
  loop_control:
    label: "{{ item.name | default('unnamed') }}"
    extended: true

- name: Validate tier names are unique
  ansible.builtin.assert:
    that:
      - (vast_storage_tiers | map(attribute='name') | list | unique | length) == (vast_storage_tiers | length)
    fail_msg: >-
      Duplicate tier names found in VAST_STORAGE_TIERS:
      {{ vast_storage_tiers | map(attribute='name') | list }}.
      Each tier must have a unique name.

- name: Read global storage settings from environment
  ansible.builtin.set_fact:
    vast_storage_encryption_enabled: "{{ lookup('env', 'STORAGE_ENCRYPTION_ENABLED') | default('true', true) | bool }}"
    vast_storage_snapshots_enabled: "{{ lookup('env', 'STORAGE_SNAPSHOTS_ENABLED') | default('true', true) | bool }}"

# Task 3, Step 3: Quota validation — placed before credential resolution so bad params fail without VMS API calls (SDR-011)
- name: Validate quota parameters in tier definitions
  when: item.quota is defined
  ansible.builtin.assert:
    that:
      - item.quota.hard_limit_gb is defined
      - item.quota.hard_limit_gb | int > 0
      - item.quota.hard_limit_gb | int == item.quota.hard_limit_gb
      - (item.quota.soft_limit_gb | default(0) | int) >= 0
      - (item.quota.soft_limit_gb | default(0) | int) <= (item.quota.hard_limit_gb | int)
    fail_msg: >-
      Invalid quota in tier '{{ item.name }}': hard_limit_gb must be a positive integer,
      soft_limit_gb (optional) must be >= 0 and <= hard_limit_gb.
      Got: {{ item.quota | to_json }}
  loop: "{{ vast_storage_tiers }}"
  loop_control:
    label: "{{ item.name }}"

# Task 2: Compute unique protocols — needed by ensure_csi_operator.yaml (included below)
- name: Compute unique protocols required across all tiers
  ansible.builtin.set_fact:
    _vast_required_protocols: "{{ vast_storage_tiers | map(attribute='protocol') | unique | list }}"

# Tasks 2-4: Outer credential scope block (SDR-001).
# Credentials are intentionally resolved before CSI install for fail-fast behavior (SDR-012 — acceptable risk).
# ensure_csi_operator.yaml must never reference credential variables.
- name: VAST backend operations (credential scope)
  block:
    # Task 2: Credential resolution moved BEFORE CSI install for fail-fast
    - name: Resolve VAST credentials (dual-source)
      ansible.builtin.include_tasks: read_credentials.yaml

    - name: Build VMS connection dict
      ansible.builtin.set_fact:
        _vast_vms_conn:
          host: "{{ vast_endpoint }}"
          username: "{{ vast_username }}"
          password: "{{ vast_password }}"
          validate_certs: "{{ vast_storage_validate_certs | default(true) }}"
          timeout: "{{ vast_storage_api_timeout | default(30) }}"
      no_log: true

    # Task 2: CSI install AFTER credential resolution
    - name: Ensure VAST CSI Operator is installed
      ansible.builtin.include_tasks: ensure_csi_operator.yaml

    - name: Provision VAST resources for tenant
      block:
        - name: Track provisioning state
          ansible.builtin.set_fact:
            _vast_tenant_created: false
            _vast_vippool_created: false

        - name: Create VAST tenant
          vastdata.vms.tenants:
            vms: "{{ _vast_vms_conn }}"
            name: "{{ tenant_storage_provision_tenant_name }}"
            state: present
          register: vast_tenant_result
          no_log: true

        - name: Mark VAST tenant as created
          ansible.builtin.set_fact:
            _vast_tenant_created: true

        - name: Fail if VAST tenant creation did not return an ID
          when: vast_tenant_result.tenants.id is not defined or vast_tenant_result.tenants.id | string | length == 0
          ansible.builtin.fail:
            msg: >-
              VAST tenant creation for '{{ tenant_storage_provision_tenant_name }}' did not return an ID.
              The vastdata.vms.tenants module response was missing 'tenants.id'. Check VAST VMS API
              connectivity and that the credentials have sufficient permissions to create tenants.

        - name: Log VAST tenant creation result
          ansible.builtin.debug:
            msg: "VAST tenant '{{ tenant_storage_provision_tenant_name }}' provisioned with ID: {{ vast_tenant_result.tenants.id }}"

        - name: Create VAST VIP pool for tenant
          vastdata.vms.vippools:
            vms: "{{ _vast_vms_conn }}"
            name: "vippool-{{ tenant_storage_provision_tenant_name }}"
            tenant_id: "{{ vast_tenant_result.tenants.id }}"
            state: present
          register: vast_vippool_result
          no_log: true

        - name: Mark VAST VIP pool as created
          ansible.builtin.set_fact:
            _vast_vippool_created: true

        - name: Fail if VAST VIP pool creation did not return an ID
          when: vast_vippool_result.vippools.id is not defined or vast_vippool_result.vippools.id | string | length == 0
          ansible.builtin.fail:
            msg: >-
              VAST VIP pool creation for 'vippool-{{ tenant_storage_provision_tenant_name }}' did not return an ID.

        - name: Log VAST VIP pool creation result
          ansible.builtin.debug:
            msg: "VAST VIP pool 'vippool-{{ tenant_storage_provision_tenant_name }}' provisioned with ID: {{ vast_vippool_result.vippools.id }}"

        # Task 3: Per-tier View creation (replaces single view task; SDR-008 — no_log because _vast_vms_conn is in params)
        - name: Create VAST View per tier
          vastdata.vms.views:
            vms: "{{ _vast_vms_conn }}"
            name: "view-{{ tenant_storage_provision_tenant_name }}-{{ item.name }}"
            path: "/osac/{{ tenant_storage_provision_tenant_name }}/{{ item.name }}"
            tenant_id: "{{ vast_tenant_result.tenants.id }}"
            protocols:
              - "{{ item.protocol | upper }}"
            state: present
          loop: "{{ vast_storage_tiers }}"
          loop_control:
            label: "{{ item.name }}"
          register: _vast_view_results
          no_log: true

        - name: Log View creation results
          ansible.builtin.debug:
            msg: >-
              VAST View 'view-{{ item.item.name }}' provisioned at
              path '/osac/{{ tenant_storage_provision_tenant_name }}/{{ item.item.name }}'
          loop: "{{ _vast_view_results.results }}"
          loop_control:
            label: "{{ item.item.name }}"
          when: item is changed

        # Task 3: Per-tier Quota creation (opt-in; SDR-008 — no_log for same reason as View)
        - name: Create VAST Quota per tier (when quota config present)
          when: item.quota is defined and item.quota.hard_limit_gb is defined
          vastdata.vms.quotas:
            vms: "{{ _vast_vms_conn }}"
            name: "quota-{{ tenant_storage_provision_tenant_name }}-{{ item.name }}"
            path: "/osac/{{ tenant_storage_provision_tenant_name }}/{{ item.name }}"
            tenant_id: "{{ vast_tenant_result.tenants.id }}"
            hard_limit: "{{ (item.quota.hard_limit_gb | int) * 1073741824 }}"
            soft_limit: "{{ ((item.quota.soft_limit_gb | int) * 1073741824) if item.quota.soft_limit_gb is defined else omit }}"
            create_dir: false
            state: present
          loop: "{{ vast_storage_tiers }}"
          loop_control:
            label: "{{ item.name }}"
          register: _vast_quota_results
          no_log: true

      rescue:
        # Task 3: Multi-tier rollback — unconditional loop over all tiers (VMS API tolerates absent resources)
        - name: Remove VAST Views created before failure
          vastdata.vms.views:
            vms: "{{ _vast_vms_conn }}"
            name: "view-{{ tenant_storage_provision_tenant_name }}-{{ item.name }}"
            path: "/osac/{{ tenant_storage_provision_tenant_name }}/{{ item.name }}"
            state: absent
          loop: "{{ vast_storage_tiers }}"
          loop_control:
            label: "{{ item.name }}"
          ignore_errors: true
          no_log: true

        - name: Remove VAST Quotas created before failure
          when: item.quota is defined and item.quota.hard_limit_gb is defined
          vastdata.vms.quotas:
            vms: "{{ _vast_vms_conn }}"
            name: "quota-{{ tenant_storage_provision_tenant_name }}-{{ item.name }}"
            path: "/osac/{{ tenant_storage_provision_tenant_name }}/{{ item.name }}"
            state: absent
          loop: "{{ vast_storage_tiers }}"
          loop_control:
            label: "{{ item.name }}"
          ignore_errors: true
          no_log: true

        - name: Remove VAST VIP pool if created before failure
          when: _vast_vippool_created | default(false) | bool
          vastdata.vms.vippools:
            vms: "{{ _vast_vms_conn }}"
            name: "vippool-{{ tenant_storage_provision_tenant_name }}"
            state: absent
          ignore_errors: true
          no_log: true

        - name: Remove VAST tenant if created before failure
          when: _vast_tenant_created | default(false) | bool
          vastdata.vms.tenants:
            vms: "{{ _vast_vms_conn }}"
            name: "{{ tenant_storage_provision_tenant_name }}"
            state: absent
          ignore_errors: true
          no_log: true

        # Rescue block intentionally omits vast_username/vast_password to avoid credential leakage (SDR-001).
        - name: Report VAST API failure with tenant context
          ansible.builtin.fail:
            msg: >-
              VAST API operation failed for tenant '{{ tenant_storage_provision_tenant_name }}'
              against endpoint '{{ vast_endpoint }}'.
              Failed task: {{ ansible_failed_task.name | default('unknown') }}.
              Error: details suppressed (no_log active).
              Partially-created VAST resources may exist — run the delete-org-storage
              playbook to clean up before retrying.

    - name: Persist tenant resources and configure StorageClass tiers
      block:
        - name: Set tenant config facts
          ansible.builtin.set_fact:
            vast_storage_tenant_id: "{{ vast_tenant_result.tenants.id | string }}"
            vast_storage_vip_pool_name: "vippool-{{ tenant_storage_provision_tenant_name }}"

        - name: Set CSI Secret resource name
          ansible.builtin.set_fact:
            vast_storage_csi_secret_name: "vast-csi-{{ tenant_storage_provision_tenant_name }}"

        # Task 4: Tenant config Secret stores serialized tier list (replaces individual fields)
        - name: Persist tenant config to K8s Secret on hub cluster
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: "{{ vast_storage_tenant_config_secret_prefix }}{{ tenant_storage_provision_tenant_name }}"
                namespace: "{{ vast_storage_config_namespace }}"
                labels:
                  app.kubernetes.io/managed-by: osac-aap
                  osac.openshift.io/tenant: "{{ tenant_storage_provision_tenant_name }}"
              type: Opaque
              stringData:
                vast_tenant_id: "{{ vast_storage_tenant_id }}"
                vip_pool_name: "{{ vast_storage_vip_pool_name }}"
                storage_provider_type: "vast"
                storage_tiers: "{{ vast_storage_tiers | to_json }}"
          no_log: true

        - name: Create K8s CSI Secret for VAST CSI driver in tenant namespace
          kubernetes.core.k8s:
            kubeconfig: "{{ kubeconfig | default(omit) }}"
            state: present
            definition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: "{{ vast_storage_csi_secret_name }}"
                namespace: "{{ tenant_namespace }}"
                labels:
                  app.kubernetes.io/managed-by: osac-aap
                  osac.openshift.io/tenant: "{{ tenant_storage_provision_tenant_name }}"
              type: Opaque
              stringData:
                endpoint: "{{ vast_endpoint }}"
                username: "{{ vast_username }}"
                password: "{{ vast_password }}"
          no_log: true

        # Task 4: Build per-tier StorageClass list via Jinja2 comprehension (NOT looped set_fact — doesn't accumulate)
        - name: Build VAST StorageClass tier list
          ansible.builtin.set_fact:
            _vast_sc_tiers: >-
              {% set tiers = [] %}
              {% for tier in vast_storage_tiers %}
              {%   set base_params = {
                     'vipPool': vast_storage_vip_pool_name,
                     'storagePath': '/osac/' ~ tenant_storage_provision_tenant_name ~ '/' ~ tier.name,
                     'secretName': vast_storage_csi_secret_name,
                     'secretNamespace': tenant_namespace
                   } %}
              {%   if vast_storage_encryption_enabled | bool %}
              {%     set base_params = base_params | combine({'encryption': 'true'}) %}
              {%   endif %}
              {%   set _ = tiers.append({
                     'name': tier.name,
                     'provisioner': vast_storage_csi_provisioner_map[tier.protocol],
                     'parameters': base_params,
                     'volume_binding_mode': 'WaitForFirstConsumer' if tier.protocol == 'block' else 'Immediate'
                   }) %}
              {% endfor %}
              {{ tiers }}

        # Task 4: Additive tier override — any tier with replace_default: true replaces cluster default SC
        - name: Check if any tier requests default replacement
          ansible.builtin.set_fact:
            _vast_replace_default: >-
              {{ vast_storage_tiers
                 | selectattr('replace_default', 'defined')
                 | selectattr('replace_default', 'equalto', true)
                 | list | length > 0 }}

        - name: Override tier configuration for VAST
          ansible.builtin.set_fact:
            tenant_storage_provision_tiers: >-
              {{ _vast_sc_tiers if (_vast_replace_default | bool)
                 else (tenant_storage_provision_tiers + _vast_sc_tiers) }}

        - name: Check if VolumeSnapshot CRD is installed (required for VolumeSnapshotClass)
          when: vast_storage_snapshots_enabled
          kubernetes.core.k8s_info:
            api_version: apiextensions.k8s.io/v1
            kind: CustomResourceDefinition
            name: volumesnapshotclasses.snapshot.storage.k8s.io
            kubeconfig: "{{ kubeconfig | default(omit) }}"
          register: vast_storage_vsc_crd_check

        - name: Warn and skip VolumeSnapshotClass if CRD is not installed
          when: >-
            vast_storage_snapshots_enabled and
            vast_storage_vsc_crd_check.resources | default([]) | length == 0
          ansible.builtin.debug:
            msg: >-
              VolumeSnapshotClass creation skipped: VolumeSnapshot CRD
              (volumesnapshotclasses.snapshot.storage.k8s.io) not installed on cluster.
              Install the snapshot-controller to enable K8s-native snapshots.

        # Task 4: Per-tier VolumeSnapshotClass (naming: vast-snapshot-{tenant}-{tier})
        - name: Create K8s VolumeSnapshotClass per tier
          when: >-
            vast_storage_snapshots_enabled and
            vast_storage_vsc_crd_check.resources | default([]) | length > 0
          kubernetes.core.k8s:
            kubeconfig: "{{ kubeconfig | default(omit) }}"
            state: present
            definition:
              apiVersion: snapshot.storage.k8s.io/v1
              kind: VolumeSnapshotClass
              metadata:
                name: "vast-snapshot-{{ tenant_storage_provision_tenant_name }}-{{ item.name }}"
                labels:
                  app.kubernetes.io/managed-by: osac-aap
                  osac.openshift.io/tenant: "{{ tenant_storage_provision_tenant_name }}"
                  osac.openshift.io/storage-tier: "{{ item.name }}"
              driver: "{{ vast_storage_csi_provisioner_map[item.protocol] }}"
              deletionPolicy: Delete
              parameters:
                secretName: "{{ vast_storage_csi_secret_name }}"
                secretNamespace: "{{ tenant_namespace }}"
          loop: "{{ vast_storage_tiers }}"
          loop_control:
            label: "{{ item.name }}"

  always:
    # SDR-001 / SDR-017: Outer always is the authoritative credential clearing point for ALL credential facts.
    # Clears credentials in all exit paths: success, inner rescue failure, CSI install failure.
    - name: Clear VAST credentials from facts (outer scope)
      ansible.builtin.set_fact:
        vast_endpoint: ""
        vast_username: ""
        vast_password: ""
        _vast_vms_conn: {}
        vast_storage_endpoint_env: ""
        vast_storage_username_env: ""
        vast_storage_password_env: ""
        vast_storage_env_creds_available: false
        vast_storage_env_creds_partial: false
        vast_storage_admin_secret: {}
      no_log: true
