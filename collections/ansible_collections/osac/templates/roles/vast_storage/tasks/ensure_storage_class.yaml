---
# VAST ensure_storage_class: creates CSI Secret + per-tier StorageClasses.
# CRITICAL SECURITY: CSI Secret uses per-tenant user credentials ONLY.
# Admin credentials are NEVER loaded or referenced in this file.

- name: Fail if provisioning target is not yet supported
  when: _provisioning_target != 'vmaas'
  ansible.builtin.fail:
    msg: >-
      VAST storage provisioning for target '{{ _provisioning_target }}' is not yet
      implemented. Only 'vmaas' is currently supported.

- name: Assert _provider_tiers is defined and non-empty
  ansible.builtin.assert:
    that:
      - _provider_tiers is defined
      - _provider_tiers | length > 0
    fail_msg: >-
      _provider_tiers must be provided by the service role dispatcher.

- name: Compute unique protocols from tiers
  ansible.builtin.set_fact:
    _vast_required_protocols: "{{ _provider_tiers | map(attribute='protocol') | unique | sort | list }}"

- name: Build expected StorageClass names per tier
  ansible.builtin.set_fact:
    _vast_expected_sc_names: >-
      {% set names = [] -%}
      {% for tier in _provider_tiers -%}
      {% set _ = names.append('vast-' ~ tier.protocol ~ '-' ~ tenant_name ~ '-' ~ tier.name) -%}
      {% endfor -%}
      {{ names }}

# Short-circuit -- check if ALL tiers' StorageClasses already exist (single API call)
- name: Check existing tenant StorageClasses
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: StorageClass
    label_selectors:
      - "osac.openshift.io/tenant={{ tenant_name }}"
      - "app.kubernetes.io/managed-by=osac-aap"
  register: _vast_sc_checks

- name: Determine if all StorageClasses already exist
  ansible.builtin.set_fact:
    _vast_all_sc_exist: >-
      {{ (_vast_sc_checks.resources | map(attribute='metadata.name') | sort | list)
         == (_vast_expected_sc_names | sort | list) }}

- name: Set output facts and skip provisioning when all SCs exist
  when: _vast_all_sc_exist | bool
  block:
    - name: Set StorageClass names output (short-circuit)
      ansible.builtin.set_fact:
        storage_provider_storage_class_names: "{{ _vast_expected_sc_names }}"

    - name: Log short-circuit
      ansible.builtin.debug:
        msg: "All {{ _vast_expected_sc_names | length }} StorageClasses already exist — skipping provisioning."

# --- Full provisioning path ---
- name: Provision StorageClasses and CSI resources
  when: not (_vast_all_sc_exist | bool)
  block:
    - name: Read per-tenant credentials and config from hub Secret
      ansible.builtin.include_tasks: read_tenant_credentials.yaml

    - name: Ensure VAST CSI Operator is installed
      ansible.builtin.include_tasks: ensure_csi_operator.yaml

    - name: Set CSI Secret resource name
      ansible.builtin.set_fact:
        _vast_csi_secret_name: "vast-csi-{{ tenant_name }}"

    - name: Set block encryption passphrase from caller or persisted hub Secret
      ansible.builtin.set_fact:
        _vast_block_encryption_passphrase: "{{ storage_provider_block_encryption_passphrase | default(_vast_tenant_block_encryption_passphrase | default('')) }}"
      no_log: true

    # CSI Secret uses per-tenant Manager username/password — NEVER admin creds
    - name: Build CSI Secret data
      ansible.builtin.set_fact:
        _vast_csi_secret_data:
          username: "{{ _vast_tenant_csi_username }}"
          password: "{{ _vast_tenant_csi_password }}"
          endpoint: "{{ _vast_tenant_endpoint }}"
      no_log: true

    - name: Add passphrase to CSI Secret data for block encryption
      ansible.builtin.set_fact:
        _vast_csi_secret_data: "{{ _vast_csi_secret_data | combine({'passphrase': _vast_block_encryption_passphrase}) }}"
      no_log: true
      when: _vast_block_encryption_passphrase | default('') | length > 0

    - name: Create CSI Secret with per-tenant manager credentials in tenant namespace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "{{ _vast_csi_secret_name }}"
            namespace: "{{ tenant_namespace }}"
            labels:
              app.kubernetes.io/managed-by: osac-aap
              osac.openshift.io/tenant: "{{ tenant_name }}"
          type: Opaque
          stringData: "{{ _vast_csi_secret_data }}"
      no_log: true

    - name: Build base StorageClass parameters
      ansible.builtin.set_fact:
        _vast_sc_base_params:
          vipPool: "{{ _vast_tenant_vip_pool }}"
          secretName: "{{ _vast_csi_secret_name }}"
          secretNamespace: "{{ tenant_namespace }}"
          viewPolicy: "{{ _vast_view_policy_name | default('default') }}"

    - name: Add block host encryption parameters when passphrase is available
      ansible.builtin.set_fact:
        _vast_sc_block_encryption_params:
          hostEncryption: "true"
      when:
        - _vast_block_encryption_passphrase | default('') | length > 0
        - _vast_required_protocols | intersect(['block']) | length > 0

    - name: Filter NFS tiers
      ansible.builtin.set_fact:
        _vast_nfs_tiers: "{{ _provider_tiers | selectattr('protocol', 'equalto', 'nfs') | list }}"

    - name: Filter block tiers
      ansible.builtin.set_fact:
        _vast_block_tiers: "{{ _provider_tiers | selectattr('protocol', 'equalto', 'block') | list }}"

    - name: Create NFS StorageClass per tier
      when: _vast_nfs_tiers | length > 0
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: "vast-{{ item.protocol }}-{{ tenant_name }}-{{ item.name }}"
            labels:
              app.kubernetes.io/managed-by: osac-aap
              osac.openshift.io/tenant: "{{ tenant_name }}"
              osac.openshift.io/storage-tier: "{{ item.name }}"
              osac.openshift.io/storage-protocol: "{{ item.protocol }}"
          provisioner: "{{ vast_storage_csi_provisioner_map[item.protocol] }}"
          parameters: >-
            {{ _vast_sc_base_params
               | combine({'storagePath': '/osac/' ~ tenant_name ~ '/' ~ item.name})
               | combine(({'qosPolicy': item.qos_policy} if item.qos_policy is defined else {})) }}
          reclaimPolicy: Delete
          volumeBindingMode: Immediate
      loop: "{{ _vast_nfs_tiers }}"
      loop_control:
        label: "vast-{{ item.protocol }}-{{ tenant_name }}-{{ item.name }}"

    - name: Create block StorageClass per tier
      when: _vast_block_tiers | length > 0
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: "vast-{{ item.protocol }}-{{ tenant_name }}-{{ item.name }}"
            labels:
              app.kubernetes.io/managed-by: osac-aap
              osac.openshift.io/tenant: "{{ tenant_name }}"
              osac.openshift.io/storage-tier: "{{ item.name }}"
              osac.openshift.io/storage-protocol: "{{ item.protocol }}"
          provisioner: "{{ vast_storage_csi_provisioner_map[item.protocol] }}"
          parameters: >-
            {{ _vast_sc_base_params
               | combine({'storagePath': '/osac/' ~ tenant_name ~ '/' ~ item.name})
               | combine(_vast_sc_block_encryption_params | default({}))
               | combine(({'qosPolicy': item.qos_policy} if item.qos_policy is defined else {})) }}
          reclaimPolicy: Delete
          volumeBindingMode: WaitForFirstConsumer
      loop: "{{ _vast_block_tiers }}"
      loop_control:
        label: "vast-{{ item.protocol }}-{{ tenant_name }}-{{ item.name }}"

    - name: Check if VolumeSnapshot CRD is installed
      when: storage_provider_snapshots_enabled | default(true)
      kubernetes.core.k8s_info:
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: volumesnapshotclasses.snapshot.storage.k8s.io
      register: _vast_vsc_crd_check

    - name: Create VolumeSnapshotClass per tier
      when: >-
        (storage_provider_snapshots_enabled | default(true)) and
        (_vast_vsc_crd_check.resources | default([]) | length > 0)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: snapshot.storage.k8s.io/v1
          kind: VolumeSnapshotClass
          metadata:
            name: "vast-snapshot-{{ tenant_name }}-{{ item.name }}"
            labels:
              app.kubernetes.io/managed-by: osac-aap
              osac.openshift.io/tenant: "{{ tenant_name }}"
              osac.openshift.io/storage-tier: "{{ item.name }}"
          driver: "{{ vast_storage_csi_provisioner_map[item.protocol] }}"
          deletionPolicy: Delete
          parameters:
            secretName: "{{ _vast_csi_secret_name }}"
            secretNamespace: "{{ tenant_namespace }}"
      loop: "{{ _provider_tiers }}"
      loop_control:
        label: "vast-snapshot-{{ tenant_name }}-{{ item.name }}"

    - name: Set StorageClass names output (list)
      ansible.builtin.set_fact:
        storage_provider_storage_class_names: "{{ _vast_expected_sc_names }}"

  always:
    # Clear per-tenant credential facts (admin creds were never loaded)
    - name: Clear per-tenant credential facts from play scope
      ansible.builtin.set_fact:
        _vast_tenant_csi_username: ""
        _vast_tenant_csi_password: ""
        _vast_tenant_endpoint: ""
        _vast_tenant_vip_pool: ""
        _vast_tenant_config_secret: {}
        _vast_block_encryption_passphrase: ""
        _vast_csi_secret_data: {}
        _vast_view_policy_name: ""
        _vast_tenant_block_encryption_passphrase: ""
        _vast_sc_block_encryption_params: {}
        _vast_nfs_tiers: []
        _vast_block_tiers: []
      no_log: true
