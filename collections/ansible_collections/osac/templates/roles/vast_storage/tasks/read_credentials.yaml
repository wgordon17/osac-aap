---
# Dual-source: env vars primary (tenant-operations-ig envFrom), K8s Secret fallback.
- name: Read VAST credentials from environment variables
  ansible.builtin.set_fact:
    vast_storage_endpoint_env: "{{ lookup('env', 'VAST_ENDPOINT') }}"
    vast_storage_username_env: "{{ lookup('env', 'VAST_USERNAME') }}"
    vast_storage_password_env: "{{ lookup('env', 'VAST_PASSWORD') }}"
  no_log: true

- name: Check if env var credentials are available
  ansible.builtin.set_fact:
    vast_storage_env_creds_available: >-
      {{ vast_storage_endpoint_env | length > 0 and
         vast_storage_username_env | length > 0 and
         vast_storage_password_env | length > 0 }}
    vast_storage_env_creds_partial: >-
      {{ (vast_storage_endpoint_env | length > 0 or
          vast_storage_username_env | length > 0 or
          vast_storage_password_env | length > 0) and
         not (vast_storage_endpoint_env | length > 0 and
              vast_storage_username_env | length > 0 and
              vast_storage_password_env | length > 0) }}
  no_log: true

# This debug task must NEVER reference _env suffix variables (credential values).
- name: Warn about partial env var credentials (falling back to K8s Secret)
  when: vast_storage_env_creds_partial | bool
  ansible.builtin.debug:
    msg: >-
      Partial VAST credential env vars detected (not all of VAST_ENDPOINT, VAST_USERNAME,
      VAST_PASSWORD are set). Falling back to K8s Secret
      '{{ vast_storage_admin_secret_name }}' in namespace '{{ vast_storage_config_namespace }}'.
      Ensure all three env vars are set together, or leave all three unset to use the Secret fallback.

- name: Read VAST admin credentials from K8s Secret (fallback for JIT)
  when: not (vast_storage_env_creds_available | bool)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ vast_storage_admin_secret_name }}"
    namespace: "{{ vast_storage_config_namespace }}"
  register: vast_storage_admin_secret
  no_log: true
  failed_when: false

- name: Fail if K8s API error reading credential Secret
  when: >-
    not (vast_storage_env_creds_available | bool) and
    vast_storage_admin_secret is failed
  ansible.builtin.fail:
    msg: >-
      K8s API error reading Secret '{{ vast_storage_admin_secret_name }}'
      in namespace '{{ vast_storage_config_namespace }}': {{ vast_storage_admin_secret.msg | default('unknown error') }}.
      Check RBAC permissions and API server connectivity.

- name: Fail if K8s Secret fallback not found
  when: >-
    not (vast_storage_env_creds_available | bool) and
    vast_storage_admin_secret is not failed and
    (vast_storage_admin_secret.resources | default([]) | length == 0)
  ansible.builtin.fail:
    msg: >-
      VAST credentials not found from either source.
      Primary: VAST_ENDPOINT, VAST_USERNAME, VAST_PASSWORD env vars are empty.
      Fallback: K8s Secret '{{ vast_storage_admin_secret_name }}' not found in
      namespace '{{ vast_storage_config_namespace }}'.
      For tenant-operations-ig: set env vars via the storage-operations-ig Secret.
      For JIT (compute-instance-ig): create the vast-admin-credentials Secret in
      {{ vast_storage_config_namespace }}.

- name: Set VAST credentials from environment variables
  when: vast_storage_env_creds_available | bool
  ansible.builtin.set_fact:
    vast_endpoint: "{{ vast_storage_endpoint_env }}"
    vast_username: "{{ vast_storage_username_env }}"
    vast_password: "{{ vast_storage_password_env }}"
  no_log: true

- name: Set VAST credentials from K8s Secret fallback
  when: not (vast_storage_env_creds_available | bool)
  ansible.builtin.set_fact:
    vast_endpoint: "{{ vast_storage_admin_secret.resources[0].data.endpoint | b64decode }}"
    vast_username: "{{ vast_storage_admin_secret.resources[0].data.username | b64decode }}"
    vast_password: "{{ vast_storage_admin_secret.resources[0].data.password | b64decode }}"
  no_log: true

- name: Clear K8s Secret object from facts after credential extraction
  when: not (vast_storage_env_creds_available | bool)
  ansible.builtin.set_fact:
    vast_storage_admin_secret: {}
  no_log: true

- name: Fail if decoded credentials from K8s Secret are empty
  when: >-
    not (vast_storage_env_creds_available | bool) and
    (vast_endpoint | length == 0 or
     vast_username | length == 0 or
     vast_password | length == 0)
  ansible.builtin.fail:
    msg: >-
      VAST credentials decoded from K8s Secret '{{ vast_storage_admin_secret_name }}'
      contain empty values. Ensure the Secret has non-empty 'endpoint', 'username',
      and 'password' data fields (base64-encoded).

- name: Clear intermediate env credential facts
  ansible.builtin.set_fact:
    vast_storage_endpoint_env: ""
    vast_storage_username_env: ""
    vast_storage_password_env: ""
  no_log: true
