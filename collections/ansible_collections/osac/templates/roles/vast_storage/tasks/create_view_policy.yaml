---
# Creates a per-tenant VAST view policy using the vendored vastdata.vms.viewpolicies module.
# The policy is named osac-{tenant_name} and uses NFS flavor.
# Idempotent: the module handles create-or-update via state: present.
#
# Requires in scope (set by setup.yaml before calling this file):
#   _vast_vms_conn                — VAST VMS connection dict
#   _vast_tenant_result.tenants.id — VAST tenant ID
#   tenant_name                   — play-level var
#
# Sets output facts:
#   _vast_view_policy_name
#   _vast_view_policy_id

- name: Set view policy name
  ansible.builtin.set_fact:
    _vast_view_policy_name: "osac-{{ tenant_name }}"

- name: Create per-tenant view policy
  vastdata.vms.viewpolicies:
    vms: "{{ _vast_vms_conn }}"
    name: "{{ _vast_view_policy_name }}"
    flavor: NFS
    tenant_id: "{{ _vast_tenant_result.tenants.id }}"
    state: present
  register: _vast_view_policy_result
  no_log: true

- name: Set view policy ID from result
  ansible.builtin.set_fact:
    _vast_view_policy_id: "{{ _vast_view_policy_result.viewpolicies.id }}"

- name: Log view policy creation result
  ansible.builtin.debug:
    msg: "View policy '{{ _vast_view_policy_name }}' ensured (id: {{ _vast_view_policy_id }})"
