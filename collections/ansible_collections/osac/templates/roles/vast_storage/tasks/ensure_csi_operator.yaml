---
# _vast_required_protocols is set by configure_backend.yaml before this file is included.
# vast_storage_csi_provisioner_map is defined in defaults/main.yaml.

- name: Check if VAST CSI driver is installed for each required protocol
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: CSIDriver
    name: "{{ vast_storage_csi_provisioner_map[item] }}"
    kubeconfig: "{{ kubeconfig | default(omit) }}"
  loop: "{{ _vast_required_protocols }}"
  loop_control:
    label: "{{ item }}"
  register: _vast_csi_driver_checks

- name: Determine which protocols need CSI driver installation
  ansible.builtin.set_fact:
    _vast_protocols_needing_install: >-
      {{ _vast_csi_driver_checks.results
         | selectattr('resources', 'equalto', [])
         | map(attribute='item') | list }}

# OLM guards below are protocol-independent — run once, gated on any protocol needing install.

- name: Check if OLM is available on cluster
  when: _vast_protocols_needing_install | length > 0
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: CatalogSource
    namespace: openshift-marketplace
    kubeconfig: "{{ kubeconfig | default(omit) }}"
  register: _vast_olm_check
  ignore_errors: true

- name: Fail if OLM is not available and CSI driver installation is needed
  when:
    - _vast_protocols_needing_install | length > 0
    - _vast_olm_check.failed | default(false)
  ansible.builtin.fail:
    msg: >-
      VAST CSI driver is not installed for protocols {{ _vast_protocols_needing_install | join(', ') }}
      and OLM (Operator Lifecycle Manager) is not available on this cluster.
      Install OLM or deploy the VAST CSI driver manually.

- name: Warn if OLM is available but no CatalogSources found
  when:
    - _vast_protocols_needing_install | length > 0
    - not (_vast_olm_check.failed | default(false))
    - _vast_olm_check.resources | length == 0
  ansible.builtin.debug:
    msg: >-
      OLM API is reachable but no CatalogSources found in openshift-marketplace.
      The VAST CSI Operator Subscription may fail to install. Ensure the
      certified-operators CatalogSource is available before provisioning.

# Creating an OLM Subscription grants cluster-admin-equivalent privileges to the operator.
# This is a privilege escalation surface (SDR-002) — only the vast-csi-operator is granted,
# installed once regardless of how many protocols are required.
- name: Ensure VAST CSI Operator Subscription exists
  when: _vast_protocols_needing_install | length > 0
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig | default(omit) }}"
    definition:
      apiVersion: operators.coreos.com/v1alpha1
      kind: Subscription
      metadata:
        name: vast-csi-operator
        namespace: "{{ vast_storage_csi_operator_namespace }}"
      spec:
        channel: "{{ vast_storage_csi_operator_channel }}"
        name: vast-csi-operator
        source: "{{ vast_storage_csi_operator_catalog_source }}"
        sourceNamespace: "{{ vast_storage_csi_operator_catalog_namespace }}"
        installPlanApproval: "{{ vast_storage_csi_operator_approval }}"

- name: Wait for VastCSIDriver CRD to be available
  when: _vast_protocols_needing_install | length > 0
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: vastcsidrivers.csi.vastdata.com
    kubeconfig: "{{ kubeconfig | default(omit) }}"
  register: _vast_crd_check
  retries: 30
  delay: 10
  until: _vast_crd_check.resources | length > 0

# Protocol-deterministic naming: vastcsi-driver-nfs, vastcsi-driver-block.
# Assumes operator supports multiple VastCSIDriver CRs with different driverTypes.
- name: Ensure VastCSIDriver CR exists for each required protocol
  when: _vast_protocols_needing_install | length > 0
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig | default(omit) }}"
    definition:
      apiVersion: csi.vastdata.com/v1
      kind: VastCSIDriver
      metadata:
        name: "{{ vast_storage_csi_driver_name }}-{{ item }}"
        namespace: "{{ vast_storage_csi_operator_namespace }}"
      spec:
        driverType: "{{ item }}"
  loop: "{{ _vast_protocols_needing_install }}"
  loop_control:
    label: "{{ item }}"
    extended: true

- name: Wait for VAST CSI drivers to be registered
  when: _vast_protocols_needing_install | length > 0
  kubernetes.core.k8s_info:
    api_version: storage.k8s.io/v1
    kind: CSIDriver
    name: "{{ vast_storage_csi_provisioner_map[item] }}"
    kubeconfig: "{{ kubeconfig | default(omit) }}"
  loop: "{{ _vast_protocols_needing_install }}"
  loop_control:
    label: "{{ item }}"
  register: _vast_csi_driver_wait
  retries: 30
  delay: 10
  until: _vast_csi_driver_wait.resources | length > 0
