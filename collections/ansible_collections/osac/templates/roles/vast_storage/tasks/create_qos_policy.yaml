---
# Creates per-tier QoS policies on VAST via REST API for tiers that define qos_policy.
# Uses ansible.builtin.uri because the vendored collection has no QoS module.
#
# Requires in scope (set by setup.yaml before calling this file):
#   vast_endpoint                  — VMS API hostname
#   vast_username / vast_password  — admin credentials
#   vast_storage_validate_certs    — TLS validation flag
#   vast_storage_api_timeout       — API timeout (seconds)
#   _vast_tenant_result.tenants.id — VAST tenant ID
#   _provider_tiers                — tier list from dispatcher
#
# Sets output fact:
#   _vast_qos_policy_names — list of created QoS policy names

- name: Filter tiers with qos_policy defined
  ansible.builtin.set_fact:
    _vast_qos_tiers: "{{ _provider_tiers | selectattr('qos_policy', 'defined') | list }}"

- name: Skip QoS policy creation when no tiers define qos_policy
  when: _vast_qos_tiers | length == 0
  block:
    - name: Set empty QoS policy names
      ansible.builtin.set_fact:
        _vast_qos_policy_names: []

    - name: Log QoS policy skip
      ansible.builtin.debug:
        msg: "No tiers define qos_policy — skipping QoS policy creation."

- name: Create QoS policies for tiers that define them
  when: _vast_qos_tiers | length > 0
  block:
    - name: Authenticate to VAST VMS as admin for QoS management
      ansible.builtin.uri:
        url: "https://{{ vast_endpoint }}/api/token/"
        method: POST
        body_format: json
        body:
          username: "{{ vast_username }}"
          password: "{{ vast_password }}"
        validate_certs: "{{ vast_storage_validate_certs }}"
        timeout: "{{ vast_storage_api_timeout | int }}"
        status_code: [200, 201]
      register: _vast_qos_auth
      no_log: true

    - name: Check if QoS policy already exists per tier
      ansible.builtin.uri:
        url: "https://{{ vast_endpoint }}/api/qospolicies/?name={{ item.qos_policy | urlencode }}"
        method: GET
        headers:
          Authorization: "Bearer {{ _vast_qos_auth.json.access }}"
        validate_certs: "{{ vast_storage_validate_certs }}"
        timeout: "{{ vast_storage_api_timeout | int }}"
        status_code: [200]
      loop: "{{ _vast_qos_tiers }}"
      loop_control:
        label: "{{ item.qos_policy }}"
      register: _vast_qos_check_results
      no_log: true

    - name: Create QoS policies that do not yet exist
      ansible.builtin.uri:
        url: "https://{{ vast_endpoint }}/api/qospolicies/"
        method: POST
        body_format: json
        body: >-
          {{ {'name': item.item.qos_policy,
              'tenant_id': _vast_tenant_result.tenants.id | int,
              'mode': 'STATIC'}
             | combine(item.item.qos_limits | default({})) }}
        headers:
          Authorization: "Bearer {{ _vast_qos_auth.json.access }}"
        validate_certs: "{{ vast_storage_validate_certs }}"
        timeout: "{{ vast_storage_api_timeout | int }}"
        status_code: [200, 201]
      loop: "{{ _vast_qos_check_results.results }}"
      loop_control:
        label: "{{ item.item.qos_policy }}"
      when: item.json | length == 0
      register: _vast_qos_create_results
      no_log: true

    - name: Set QoS policy names output fact
      ansible.builtin.set_fact:
        _vast_qos_policy_names: "{{ _vast_qos_tiers | map(attribute='qos_policy') | list }}"

    - name: Log QoS policy creation results
      ansible.builtin.debug:
        msg: "QoS policies ensured: {{ _vast_qos_policy_names | to_json }}"

  always:
    - name: Clear QoS auth facts
      ansible.builtin.set_fact:
        _vast_qos_auth: {}
        _vast_qos_check_results: {}
        _vast_qos_create_results: {}
      no_log: true
