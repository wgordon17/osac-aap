---
title: VAST Data Storage Provider
description: >
  Provisions VAST Data storage resources for OSAC tenants.
  Creates VAST tenants, per-tier views/quotas, and per-tenant users via
  vastdata.vms. Uses a globally-shared VIP pool. Manages K8s Secrets and
  StorageClasses with VAST CSI parameters and EP #26 labels. Admin
  credentials never enter tenant-namespace Secrets.

template_type: storage_provider
implementation_strategy: vast
capabilities:
  supported_protocols:
    - nfs
    - block
  provisioning_targets:
    - vmaas
    - hcp_control_plane
    - hcp_worker_root
    - hcp_data_plane
