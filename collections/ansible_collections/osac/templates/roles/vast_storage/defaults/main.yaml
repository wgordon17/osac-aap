---
# VAST-specific defaults — all use vast_storage_ prefix.
# Env-var-driven defaults follow the OSAC domain pattern:
#   OSAC_PUBLISH_TEMPLATES_NAMESPACE_DEFAULT, OSAC_COMPUTE_INSTANCE_OPERATIONS_NAMESPACE_DEFAULT

# DEPRECATED: retained for cleanup_backend backward compat until PR 2 merges.
# PR 2 (Task 5) removes this when cleanup_backend is rewritten for multi-tier.
vast_storage_protocol: "nfs"

# Multi-tier storage configuration — raw string from VAST_STORAGE_TIERS env var.
# Parsed via from_json in configure_backend.yaml so parse errors produce actionable Ansible messages.
# Each tier: {name: string, protocol: 'nfs'|'block', quota?: {hard_limit_gb: int, soft_limit_gb?: int}, replace_default?: bool}
_vast_storage_tiers_raw: "{{ lookup('env', 'VAST_STORAGE_TIERS') | default('', true) }}"

# Maximum number of tiers allowed (SDR-010: prevents VMS API call amplification)
vast_storage_max_tiers: 20

# CSI provisioner names keyed by protocol (replaces individual vast_storage_csi_provisioner_nfs/block vars)
vast_storage_csi_provisioner_map:
  nfs: "csi.vastdata.com"
  block: "block.csi.vastdata.com"

# K8s Secret on hub cluster that stores per-tenant VAST config (tenant ID, VIP pool, tiers)
vast_storage_tenant_config_secret_prefix: "vast-tenant-config-"

# Namespace for hub-cluster config secrets — set via OSAC_STORAGE_CONFIG_NAMESPACE env var
# in the tenant-operations-ig pod spec (downward API metadata.namespace).
vast_storage_config_namespace: "{{ lookup('env', 'OSAC_STORAGE_CONFIG_NAMESPACE') | default('osac-system', true) }}"

# K8s Secret name for VAST admin credentials used as JIT fallback
# (when running in compute-instance-ig which lacks VAST env vars in envFrom)
vast_storage_admin_secret_name: "vast-admin-credentials"

# TLS certificate validation for VAST VMS API calls.
# Set to true in production; false allows self-signed certs in dev/test environments.
vast_storage_validate_certs: true

# API timeout (seconds) passed to the vastdata.vms modules via the vms: connection dict.
# JIT runs inline — keep timeouts short to avoid blocking VM creation.
vast_storage_api_timeout: 30

# CSI Operator installation via OLM
vast_storage_csi_operator_namespace: "openshift-operators"
vast_storage_csi_operator_channel: "stable"
# Automatic allows unattended upgrades; Manual requires human InstallPlan approval
# which blocks automated provisioning in AAP workflows.
vast_storage_csi_operator_approval: "Automatic"
vast_storage_csi_driver_name: "vastcsi-driver"
