---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: vast-nfs-test-tenant-default
  labels:
    app.kubernetes.io/managed-by: osac-aap
    osac.openshift.io/tenant: test-tenant
    osac.openshift.io/storage-tier: default
    osac.openshift.io/storage-protocol: nfs
provisioner: vastcsi-driver-nfs
parameters:
  vipPool: vippool-test-tenant
  storagePath: /osac/test-tenant/default
  secretName: vast-csi-test-tenant
  secretNamespace: test-tenant-ns
reclaimPolicy: Delete
volumeBindingMode: Immediate
