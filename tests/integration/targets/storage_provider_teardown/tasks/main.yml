---
# Integration test for osac.service.storage_provider teardown action.
# Tests the full teardown lifecycle: deletes StorageClass, CSI Secret, hub Secret,
# and verifies mock VMS server received delete calls.
# Requires: mock VMS server on 127.0.0.1:18443, kind cluster with osac-system namespace.

# ── Setup: Reset mock server and pre-create resources ──
- name: "Storage Provider Teardown - Setup fixtures"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Create hub Secret fixture
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "vast-tenant-config-test-teardown"
            namespace: "osac-system"
            labels:
              app.kubernetes.io/managed-by: osac-aap
              osac.openshift.io/tenant: "test-teardown"
          type: Opaque
          stringData:
            vast_tenant_id: "999"
            vast_local_provider_id: "1"
            vip_pool_name: "osac-test-pool"
            vast_endpoint: "127.0.0.1:18443"
            storage_tiers: '[{"name":"default","protocol":"nfs","provider":"vast","qos_policy":"test-qos","qos_limits":{"static_limits":{"max_reads_bw_mbps":100,"max_writes_bw_mbps":100}}}]'
            storage_provider_type: "vast"
            tenant_manager_name: "osac-test-teardown"
            tenant_manager_username: "osac-test-teardown"
            tenant_manager_password: "test-csi-password"
            tenant_manager_id: "42"
            tenant_role_id: "7"
            view_policy_name: "osac-test-teardown"

    - name: Create StorageClass fixture
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: storage.k8s.io/v1
          kind: StorageClass
          metadata:
            name: "vast-nfs-test-teardown-default"
            labels:
              app.kubernetes.io/managed-by: osac-aap
              osac.openshift.io/tenant: "test-teardown"
              osac.openshift.io/storage-tier: "default"
              osac.openshift.io/storage-protocol: "nfs"
          provisioner: vastcsi-driver-nfs
          parameters:
            vipPool: "osac-test-pool"
            storagePath: "/osac/test-teardown/default"
            secretName: "vast-csi-test-teardown"
            secretNamespace: "osac-system"
          reclaimPolicy: Delete
          volumeBindingMode: Immediate

    - name: Create CSI Secret fixture
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: "vast-csi-test-teardown"
            namespace: "osac-system"
            labels:
              app.kubernetes.io/managed-by: osac-aap
              osac.openshift.io/tenant: "test-teardown"
          type: Opaque
          stringData:
            token: "test-api-token-for-csi"
            endpoint: "127.0.0.1:18443"

    - name: Check if VolumeSnapshotClass CRD exists
      kubernetes.core.k8s_info:
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: volumesnapshotclasses.snapshot.storage.k8s.io
      register: _vsc_crd_check

    - name: Create VolumeSnapshotClass fixture (when CRD exists)
      when: _vsc_crd_check.resources | length > 0
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: snapshot.storage.k8s.io/v1
          kind: VolumeSnapshotClass
          metadata:
            name: "vast-snapshot-test-teardown-default"
            labels:
              app.kubernetes.io/managed-by: osac-aap
              osac.openshift.io/tenant: "test-teardown"
              osac.openshift.io/storage-tier: "default"
          driver: csi.vastdata.com
          deletionPolicy: Delete
          parameters:
            secretName: "vast-csi-test-teardown"
            secretNamespace: "osac-system"

    - name: Verify all fixtures created
      block:
        - name: Verify hub Secret exists
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Secret
            name: "vast-tenant-config-test-teardown"
            namespace: "osac-system"
          register: _verify_hub

        - name: Verify StorageClass exists
          kubernetes.core.k8s_info:
            api_version: storage.k8s.io/v1
            kind: StorageClass
            name: "vast-nfs-test-teardown-default"
          register: _verify_sc

        - name: Verify CSI Secret exists
          kubernetes.core.k8s_info:
            api_version: v1
            kind: Secret
            name: "vast-csi-test-teardown"
            namespace: "osac-system"
          register: _verify_csi

        - name: Assert all fixtures are in place
          ansible.builtin.assert:
            that:
              - _verify_hub.resources | length == 1
              - _verify_sc.resources | length == 1
              - _verify_csi.resources | length == 1
            fail_msg: "Not all fixtures were created successfully"
            success_msg: "All fixtures created: hub Secret, StorageClass, CSI Secret"

# ── Test: Run teardown ──
- name: "Storage Provider Teardown - Run teardown"
  hosts: localhost
  gather_facts: false

  environment:
    VAST_ENDPOINT: "127.0.0.1:18443"
    VAST_USERNAME: "admin"
    VAST_PASSWORD: "admin"
    OSAC_STORAGE_CONFIG_NAMESPACE: "osac-system"

  vars:
    tenant_name: "test-teardown"
    tenant_namespace: "osac-system"
    storage_provider_tiers:
      - name: default
        protocol: nfs
        provider: vast
    storage_provider_provisioning_target: vmaas
    storage_provider_action: teardown
    vast_storage_validate_certs: false

  tasks:
    - name: Call storage_provider role with teardown action
      ansible.builtin.include_role:
        name: osac.service.storage_provider
      vars:
        storage_provider_action: teardown

# ── Verify: K8s resources deleted ──
- name: "Storage Provider Teardown - Verify K8s resource deletion"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Check StorageClass deleted
      kubernetes.core.k8s_info:
        api_version: storage.k8s.io/v1
        kind: StorageClass
        name: "vast-nfs-test-teardown-default"
      register: _td_sc

    - name: Assert StorageClass deleted
      ansible.builtin.assert:
        that:
          - _td_sc.resources | length == 0
        fail_msg: "StorageClass 'vast-nfs-test-teardown-default' was not deleted"
        success_msg: "StorageClass deleted"

    - name: Check CSI Secret deleted
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: "vast-csi-test-teardown"
        namespace: "osac-system"
      register: _td_csi

    - name: Assert CSI Secret deleted
      ansible.builtin.assert:
        that:
          - _td_csi.resources | length == 0
        fail_msg: "CSI Secret 'vast-csi-test-teardown' was not deleted"
        success_msg: "CSI Secret deleted"

    - name: Check hub Secret deleted (should be deleted when cleanup succeeds)
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: "vast-tenant-config-test-teardown"
        namespace: "osac-system"
      register: _td_hub

    - name: Assert hub Secret deleted
      ansible.builtin.assert:
        that:
          - _td_hub.resources | length == 0
        fail_msg: "Hub Secret 'vast-tenant-config-test-teardown' was not deleted (cleanup may have failed)"
        success_msg: "Hub Secret deleted"

    - name: Check VolumeSnapshotClass CRD exists for verification
      kubernetes.core.k8s_info:
        api_version: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: volumesnapshotclasses.snapshot.storage.k8s.io
      register: _td_vsc_crd

    - name: Check VolumeSnapshotClass deleted (when CRD exists)
      when: _td_vsc_crd.resources | length > 0
      kubernetes.core.k8s_info:
        api_version: snapshot.storage.k8s.io/v1
        kind: VolumeSnapshotClass
        name: "vast-snapshot-test-teardown-default"
      register: _td_vsc

    - name: Assert VolumeSnapshotClass deleted (when CRD exists)
      when: _td_vsc_crd.resources | length > 0
      ansible.builtin.assert:
        that:
          - _td_vsc.resources | length == 0
        fail_msg: "VolumeSnapshotClass 'vast-snapshot-test-teardown-default' was not deleted"
        success_msg: "VolumeSnapshotClass deleted"

# ── Verify: Mock server received expected delete calls ──
- name: "Storage Provider Teardown - Verify mock API calls"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Get mock server call log
      ansible.builtin.uri:
        url: "https://127.0.0.1:18443/_calls"
        validate_certs: false
        method: GET
        return_content: true
      register: _mock_calls

    - name: Parse mock call log
      ansible.builtin.set_fact:
        _call_log: "{{ _mock_calls.json }}"

    - name: Assert admin auth was performed for VMS cleanup
      ansible.builtin.assert:
        that:
          - _call_log | selectattr('path', 'equalto', '/api/token/') | selectattr('method', 'equalto', 'POST') | list | length > 0
        fail_msg: "No admin auth call found — teardown did not authenticate to VMS"
        success_msg: "Admin auth call detected"

    - name: Assert tenant deletion was attempted
      ansible.builtin.assert:
        that:
          - _call_log | selectattr('path', 'search', 'tenants') | list | length > 0
        fail_msg: "No tenant API call found in mock call log"
        success_msg: "Tenant API call detected"

    - name: Assert manager lookup was attempted
      ansible.builtin.assert:
        that:
          - _call_log | selectattr('path', 'search', 'managers') | list | length > 0
        fail_msg: "No manager API call found in mock call log"
        success_msg: "Manager API call detected"

    - name: Assert role lookup was attempted
      ansible.builtin.assert:
        that:
          - _call_log | selectattr('path', 'search', 'roles') | list | length > 0
        fail_msg: "No role API call found in mock call log"
        success_msg: "Role API call detected"

    - name: Assert viewPolicy deletion was attempted
      ansible.builtin.assert:
        that:
          - _call_log | selectattr('path', 'search', 'viewpolicies') | list | length > 0
        fail_msg: "No viewPolicy API call found in mock call log"
        success_msg: "viewPolicy API call detected"

    - name: Assert QoS policy deletion was attempted
      ansible.builtin.assert:
        that:
          - _call_log | selectattr('path', 'search', 'qospolicies') | list | length > 0
        fail_msg: "No QoS policy API call found in mock call log"
        success_msg: "QoS policy API call detected"

    - name: Assert view lookup was attempted (GET to find by path before delete)
      ansible.builtin.assert:
        that:
          - _call_log | selectattr('path', 'search', 'views') | list | length > 0
        fail_msg: "No view API call found in mock call log"
        success_msg: "View API call detected (lookup for deletion)"

# ── Cleanup: Best-effort removal of any remaining resources ──
- name: "Storage Provider Teardown - Final cleanup"
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Delete hub Secret (safety net)
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Secret
        name: "vast-tenant-config-test-teardown"
        namespace: "osac-system"
      failed_when: false

    - name: Delete StorageClass (safety net)
      kubernetes.core.k8s:
        state: absent
        api_version: storage.k8s.io/v1
        kind: StorageClass
        name: "vast-nfs-test-teardown-default"
      failed_when: false

    - name: Delete CSI Secret (safety net)
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Secret
        name: "vast-csi-test-teardown"
        namespace: "osac-system"
      failed_when: false
