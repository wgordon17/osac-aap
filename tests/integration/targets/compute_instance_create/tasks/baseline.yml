---
- name: Compute Instance Create - Baseline Test
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Read ComputeInstance fixture
      ansible.builtin.set_fact:
        test_compute_instance: "{{ lookup('file', '../../../fixtures/computeinstance-test.yaml') | from_yaml }}"

    - name: Set test variables for baseline workflow
      ansible.builtin.set_fact:
        ansible_eda:
          event:
            payload: "{{ test_compute_instance }}"
        tenant_target_namespace: "computeinstance-test-vm-work"
        tenant_storage_class_name: "test-storage-class"
        # Override only resource creation to prevent actual VM/DataVolume creation
        create_step_resources_override:
          name: osac.workflows.workflow_helpers
          tasks_from: noop.yml
        # Override wait/annotate since there's no VM to wait for
        create_step_wait_annotate_override:
          name: osac.workflows.workflow_helpers
          tasks_from: noop.yml

- name: Import compute instance create workflow (baseline)
  ansible.builtin.import_playbook: osac.workflows.compute_instance.create

- name: Verify baseline results
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Verify compute instance name extracted
      ansible.builtin.assert:
        that:
          - compute_instance_name is defined
          - compute_instance_name == "test-vm"
        fail_msg: "Compute instance name not extracted correctly"

    - name: Verify tenant target namespace determined
      ansible.builtin.assert:
        that:
          - tenant_target_namespace is defined
          - tenant_target_namespace == "computeinstance-test-vm-work"
        fail_msg: "Tenant target namespace not set correctly"

    - name: Verify template ID extracted
      ansible.builtin.assert:
        that:
          - template_id is defined
          - template_id == "osac.templates.ocp_virt_vm"
        fail_msg: "Template ID not extracted correctly"

    - name: Verify user-specified spec values override template defaults
      ansible.builtin.assert:
        that:
          - vm_memory == "4Gi"
          - vm_boot_disk_size == "20Gi"
        fail_msg: "User spec values should override template defaults."
