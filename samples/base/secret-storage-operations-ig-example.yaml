---
# Example Secret for VAST storage credentials mounted into tenant-operations-ig pods.
# Create in the same namespace as the tenant-operations instance group.
# STORAGE_PROVIDER_TYPE belongs in the ConfigMap, not here (see configmap-storage-operations-ig-example.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: storage-operations-ig
  namespace: osac-system  # replace with your tenant-operations namespace
type: Opaque
stringData:
  VAST_ENDPOINT: "https://vast.example.com"
  VAST_USERNAME: "osac-service-account"
  VAST_PASSWORD: "changeme"
